"此信息针对默认按键绑定情况；您可以设置更顺手的键位": "This information is for default keybindings; you can rebind them to whatever is most comfortable for you"
"注：下列按键绑定均由泰拉瑞亚设置接管。左右键仍根据Minecraft本体设置决定": "Note: The following keybindings are handled by Terraria settings. Left and right clicks are still determined by your Minecraft settings."
"通过WASD移动，空格跳跃/飞行": "Move with WASD, jump/fly with Spacebar"
"骑乘飞行类坐骑时按下左SHIFT降低高度": "Press Left SHIFT to descend while riding a flying mount"
