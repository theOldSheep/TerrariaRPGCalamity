"蓝色宝石给予30%召唤伤害和4个召唤栏，并取消手持非召唤武器的召唤伤害降低惩罚": "The blue gem grants 30% increased minion damage, +4 max minions, and removes the minion damage penalty when holding non-summon weapons"
"粉色宝石给予150防御，12%伤害减免，40%飞行时间，6生命恢复和更长的受伤无敌帧": "The pink gem grants 150 defense, 12% damage reduction, 40% increased flight time, 6 life regeneration, and increased immunity frames"
