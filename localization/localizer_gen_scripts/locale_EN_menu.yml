# Menu (including Gameplay guide)
菜单: "Menu"
'[菜单] 主菜单': "[Menu] Main Menu"
点击下方的其他菜单查看对应内容: "Click on the other menus below to view their corresponding content"
'[菜单] 玩法介绍': "[Menu] Gameplay Guide"
点击查看基本玩法介绍: "Click to view the basic gameplay guide"
'[菜单] 生物群系图鉴': "[Menu] Bestiary - Biomes"
点击查看生物群系图鉴: "Click to view the Biome Bestiary"
'[菜单] BOSS图鉴': "[Menu] Bestiary - Bosses"
点击查看BOSS图鉴: "Click to view the Boss Bestiary"
'[信息] 按键控制': "[Info] Controls"
此信息针对默认按键绑定情况；您可以设置更顺手的键位: "This information is for default keybindings; you can rebind them to whatever is most comfortable for you"
注：下列按键绑定均由泰拉瑞亚设置接管。左右键仍根据Minecraft本体设置决定: "Note: The following keybindings are handled by Terraria settings. Left and right clicks are still determined by your Minecraft settings."
通过WASD移动，空格跳跃/飞行: "Move with WASD, jump/fly with Spacebar"
骑乘飞行类坐骑时按下左SHIFT降低高度: "Press Left SHIFT to descend while riding a flying mount"
按下[K]开关更远的第三人称视角: "Press [K] to toggle the extended third-person camera"
按下[V]启用护甲套装主动效果: "Press [V] to activate Set Pieces / Armor Set Set Bonuses"
按下[B]一键使用增益类物品: "Press [B] to Quick Buff"
按下[H]一键使用背包中第一个生命药水: "Press [H] to Quick Heal with the first healing potion in your inventory"
按下[J]一键使用背包中第一个魔力药水: "Press [J] to Quick Mana with the first mana potion in your inventory"
特殊按键均会在相关物品中标明默认键位: "Special keys will have their default keybindings indicated on the relevant items"
'[信息] 物品使用': "[Info] Item Use"
可以点击左键（Minecraft设置中指定的攻击键）使用物品: "You can Left-Click (the Attack key designated in Minecraft settings) to use items"
镐和部分武器也可以点击右键（Minecraft设置中指定的交互键）使用: "Pickaxes and certain weapons can also be used by Right-Clicking (the Use/Interact key designated in Minecraft settings)"
镐的左键模式会启用自动挥舞，而右键不会: "Left-clicking with a pickaxe enables auto-swing, while right-clicking does not"
自动挥舞：允许自动挥舞的物品在使用时自动开启。自动挥舞启用时，CD结束后将自动再次使用物品: "Auto-swing: Items that allow auto-swing will automatically trigger when used. When auto-swing is enabled, the item will be used again automatically once its cooldown ends."
可再次使用武器/工具以关闭自动挥舞: "You can use the weapon/tool again to disable auto-swing"
注：物品使用速度为非整数时，会根据小数部分随机取整: "Note: When the item use speed is a non-integer, it will be randomly rounded based on its decimal part"
注：对于使用时间固定的物品，物品使用速度会被按比例无损转换为伤害: "Note: For items with a fixed use time, the item use speed is losslessly converted into a proportional damage bonus"
另外，在聊天栏中输入[i]可以展示手上物品: "Additionally, typing [i] in the chat bar will showcase the item currently in your hand"
'[信息] NPC': "[Info] NPCs"
主城处的NPC可以右键（Minecraft设置中指定的交互键）交互: "You can Right-Click (the Use/Interact key designated in Minecraft settings) to interact with NPCs in the main town"
大部分NPC在条件允许后会开启商店功能；许多交易物品存在BOSS进度需求: "Most NPCs will open a shop once conditions are met; many trade items require specific Boss progression"
点击商店中的物品以购买，点击物品栏中的物品以出售: "Click items in the shop to buy, and click items in your inventory to sell"
SHIFT+点击可以一次性出售/购买一整组物品: "SHIFT+Click to buy or sell an entire stack of items at once"
'[信息] 合成': "[Info] Crafting"
点击物品栏中的合成按钮可以开启初级合成窗口: "Click the crafting button in your inventory to open the basic crafting window"
与合成站点方块交互时可以开启相对应的合成窗口: "Interacting with a crafting station block will open its corresponding crafting window"
潜行模式下与站点交互可以查询站点中的配方: "Interacting with a station while sneaking allows you to check its recipes"
此时，若手中有物品，则显示本物品参与制作的配方: "If you are holding an item, it will show the recipes that this item is used to craft"
否则，站点中的所有配方均将显示: "Otherwise, all recipes available at this station will be displayed"
'[信息] 设置': "[Info] Settings"
您可以基于您的喜好个性化部分游戏体验: "You can personalize parts of your gameplay experience based on your preferences"
总体而言，此部分包括以下方面的设置：: "Overall, this section includes settings for the following:"
泰拉瑞亚第三人称视角（比原版更远）: "Terraria third-person camera (further than vanilla Minecraft)"
UI大小（物品栏中物品信息的显示大小仍由Minecraft的界面尺寸设置决定）: "UI Scale (The display size of item tooltips in the inventory is still determined by Minecraft's GUI Scale settings)"
辅助瞄准功能: "Aim Assist functionality"
各种键位绑定（现有按键均可自由设置）: "Various keybindings (all current keys can be freely bound)"
输入指令[/settings]查看更多信息: "Type the command [/settings] to view more information"
'[信息] 鸣谢（不分先后）': "[Info] Credits (In no particular order)"
游戏信息、音乐和贴图来源于中/英文灾厄Wiki、Terraria Wiki: "Game data, music, and textures are sourced from the Chinese/English Calamity Wikis and the Terraria Wiki"
感谢KuLou_D制作的长直模型: "Special thanks to KuLou_D for creating the worm-type boss models"
感谢潮汐之月制作的天蓝套模型: "Special thanks to Chaoshiyue for creating the Aerospec armor set models"
感谢qqqqwwpppp制作的各套装细化材质: "Special thanks to qqqqwwpppp for creating the detailed textures for each armor set"
感谢天狼星_HMS_Sirius在编写配置文件工作中提供的帮助: "Special thanks to Sirius_HMS_Sirius for their assistance in writing the configuration files"
感谢群友们的陪伴支持: "Thanks to all our community members for their companionship and support"
点击返回主菜单: "Click to return to the Main Menu"
'[信息] 世界生成': "[Info] World Generation"
世界中会生成各种矿物，包括空中的起源之簇与地上的陨石坑: "Various ores will generate throughout the world, including Aerialite Ore clusters in the sky and meteor craters on the ground"
世界中会生成铁轨网络；早期玩家即可制作矿车以更快地跑图、寻找生物群系: "A minecart track network will generate throughout the world; players can craft minecarts early on to explore faster and locate biomes"
服务器的文件夹中会自动生成出生点附近的生物群系地图，服主可考虑向玩家公开以进一步保证跑图体验: "A biome map surrounding the spawn point will automatically generate in the server folder; server owners may consider sharing it with players to enhance their exploration experience"
'[信息] 世界信息': "[Info] World Info"
世界分为三层：地表/地下层，洞穴层与地狱层: "The world is divided into three layers: Surface/Underground, Cavern, and The Underworld"
可通过与基岩交互在世界之间穿梭: "You can travel between world layers by interacting with Bedrock"
三层之间的距离比例均为1:1: "The distance ratio between all three layers is 1:1"
另外，床亦可在地狱层使用以设置出生点: "Additionally, Beds can be used in the Underworld to set your spawn point"
在各种群系钓鱼均有不同的鱼获；注意星辉瘟疫与神圣之地的鱼获仅可在困难模式（肉山后）获得: "Fishing in different biomes yields different catches; note that catches from the Astral Infection and The Hallow can only be obtained in Hardmode (Post-Wall of Flesh)"
'[信息] 森林生物群系': "[Info] Forest Biome"
出生点默认的生物群系，怪物难度较低: "The default starting biome, featuring lower monster difficulty"
可于此群系砍伐并种植树木；大部分无限制或仅有时间限制的BOSS均可在森林挑战: "You can chop down and plant trees in this biome; most bosses with no restrictions or only time restrictions can be challenged in the Forest"
注：地牢仅在森林中生成，且生成位置相对靠近海洋: "Note: The Dungeon only generates in the Forest, and its location is relatively close to the Ocean"
'[信息] 太空生物群系': "[Info] Space Biome"
地表层Y坐标高于200时视为太空群系: "The Space biome is triggered when the Y-coordinate on the Surface layer is above 200"
本群系会刷新鸟妖与困难模式（肉山后）的飞龙: "Harpies and Hardmode (Post-Wall of Flesh) Wyverns will spawn in this biome"
困难模式后此处敌人将掉落日光精华: "In Hardmode, enemies here will drop Essence of Sunlight"
代表性BOSS：风暴编织者: "Representative Boss: Storm Weaver"
'[信息] 海洋生物群系': "[Info] Ocean Biome"
海洋生物群系中的某些鱼儿似乎可以用作武器工具……: "Some fish in the Ocean biome seem to double as weapons and tools..."
代表性BOSS：阿娜希塔与利维坦，猪鲨公爵: "Representative Bosses: Anahita and The Leviathan, Duke Fishron"
'[信息] 硫磺海生物群系': "[Info] Sulphurous Sea Biome"
被工业的浪潮席卷的海洋: "An ocean swept away by waves of industrial pollution"
下方即为深不见底且极具威胁的深渊: "Directly below lies the bottomless and highly perilous Abyss"
代表性BOSS：渊海灾虫，硫海遗爵: "Representative Bosses: Aquatic Scourge, Old Duke"
'[信息] 沙漠生物群系': "[Info] Desert Biome"
硫火女巫“灾厄”蒸干海洋后留下的漫天黄沙: "Boundless sands left behind after Calamity, the Brimstone Witch, vaporized the ocean"
洞穴中仍有一些硕果仅存的水体: "A few rare bodies of water still survive deep within the caverns"
代表性BOSS：荒漠灾虫: "Representative Boss: Desert Scourge"
'[信息] 神圣之地生物群系': "[Info] The Hallow Biome"
血肉之墙轰然倒塌时被解放的光明之魂造就了这一奇观: "A spectacle forged by the Spirits of Light unleashed when the Wall of Flesh collapsed"
敌人较为强力，于困难模式开放: "Features powerful enemies and becomes available in Hardmode"
洞穴层敌人将掉落光明之魂；地表木乃伊掉落光明碎块: "Cavern layer enemies drop Souls of Light; Surface Mummies drop Light Shards"
代表性BOSS：光之女皇，亵渎天神: "Representative Bosses: Empress of Light, Providence, the Profaned Goddess"
'[信息] 丛林生物群系': "[Info] Jungle Biome"
活力十足的生物群系；可在探索途中收获丛林孢子，藤蔓与毒刺: "A vibrant biome; you can gather Jungle Spores, Vines, and Stingers during your exploration"
敌人稍显强力，建议拥有一定准备后进行探索: "Enemies are somewhat powerful; it is recommended to explore only when adequately prepared"
大小足够的丛林将于洞穴层生成一个丛林神庙，可于世纪之花后进入探索: "A sufficiently sized Jungle will generate a Jungle Temple in the Cavern layer, which can be explored after defeating Plantera"
代表性BOSS：瘟疫使者歌莉娅，丛林龙“犽戎”: "Representative Bosses: The Plaguebringer Goliath, Yharon, Dragon of Rebirth"
'[信息] 深渊生物群系': "[Info] Abyss Biome"
硫磺海洞穴层以下的海沟，存在着难以置信的深渊水压: "A trench located below the Sulphurous Sea cavern layer, where incredible abyssal water pressure exists."
本群系分为三层，且深层部分水压也相应升高：: "This biome is divided into three layers, and the water pressure increases accordingly in the deeper sections:"
Y坐标175以上，敌人难度尚可: "Above Y-level 175, enemy difficulty is manageable."
Y坐标100以上，敌人难度强劲，推荐石巨人后开采熔渣矿时前去: "Above Y-level 100, enemies are powerful; recommended to visit when mining Scoria Ore after Golem."
Y坐标100以下，敌人难度极高，推荐噬魂幽花后前往挑战迷你BOSS: "Below Y-level 100, enemy difficulty is extremely high; recommended to visit for mini-boss challenges after Polterghast."
迷你BOSS：巨像乌贼，猎魂鲨: "Mini-Bosses: Colossal Squid, Reaper Shark"
'[信息] 星辉瘟疫生物群系': "[Info] Astral Infection Biome"
自群星而来的扭曲瘟疫；在血肉之墙轰然倒塌时现身于世: "A twisted plague from the stars; it manifests in the world when the Wall of Flesh is defeated."
敌人与星辉信标建筑处的矿物均能造成星辉瘟疫减益，小心行事: "Enemies and ores near Astral Beacon structures can inflict the Astral Infection debuff, so proceed with caution."
此外，敌人会掉落星尘: "Additionally, enemies will drop Stardust."
代表性BOSS：白金星舰，星神游龙: "Representative Bosses: Astrum Aureus, Astrum Deus"
'[信息] 硫火之崖生物群系': "[Info] Brimstone Crag Biome"
地狱层中的特殊群系: "A special biome located within the Underworld layer."
敌人较为强力，请谨慎前往: "Enemies here are quite powerful, please proceed with caution."
困难模式后此处敌人将掉落混乱精华: "In Hardmode, enemies here will drop Essence of Havoc."
代表性BOSS：硫磺火元素: "Representative Bosses: Brimstone Elemental"
'[信息] 腐化之地生物群系': "[Info] The Corruption Biome"
困难模式后腐化洞穴层敌人将掉落暗影之魂；地表木乃伊掉落暗黑碎块: "In Hardmode, enemies in the Corrupt Underground layer will drop Souls of Night; surface Mummies drop Dark Shards."
代表性BOSS：世界吞噬者，腐巢意志: "Representative Bosses: Eater of Worlds, The Hive Mind"
'[信息] 沉沦之海生物群系': "[Info] Sunken Sea Biome"
沙漠洞穴中硕果仅存的旧日海洋: "The last remaining ancient ocean buried deep within the Desert caverns."
建议荒漠灾虫后与困难模式初期探索: "Recommended for exploration after the Desert Scourge and during early Hardmode."
荒漠灾虫后鬼铃水母掉落伏打凝胶: "After Desert Scourge, Ghost Bells will drop Voltaic Gel."
血肉之墙后（困难模式）巨像蛤掉落合成材料与各种武器: "After the Wall of Flesh (Hardmode), Giant Clams will drop crafting materials and various weapons."
代表性迷你BOSS：巨像蛤: "Representative Mini-Boss: Giant Clam"
'[信息] 雪原生物群系': "[Info] Snow Biome"
一片冰天雪地，树木以松树类为主: "A land of ice and snow, where the trees are predominantly pine-like."
困难模式后此处敌人将掉落冰川精华；冰雪巨人将掉落寒霜核: "In Hardmode, enemies here will drop Essence of Eleum; Ice Golems will drop Frost Cores."
代表性BOSS：极地之灵: "Representative Bosses: Cryogen"
'[菜单] BOSS图鉴（困难模式前）': "[Menu] Boss Checklist (Pre-Hardmode)"
以下BOSS排序以建议挑战顺序为准；从左到右，随后从上到下: "The following bosses are sorted by recommended progression; from left to right, then top to bottom."
BOSS战开始时会记录附近的挑战者: "When a Boss battle begins, nearby challengers will be recorded."
击败BOSS后，造成足够高伤害或吸引足够久仇恨的挑战者均视为挑战成功: "Upon defeating the Boss, challengers who dealt enough damage or held agro long enough will be credited with a successful challenge."
'[信息] 史莱姆王': "[Info] King Slime"
'[信息] 荒漠灾虫': "[Info] Desert Scourge"
'[信息] 菌生蟹': "[Info] Crabulon"
'[信息] 克苏鲁之眼': "[Info] Eye of Cthulhu"
'[信息] 世界吞噬者': "[Info] Eater of Worlds"
'[信息] 腐巢意志': "[Info] The Hive Mind"
'[信息] 骷髅王': "[Info] Skeletron"
'[信息] 史莱姆之神': "[Info] The Slime God"
'[信息] 血肉之墙': "[Info] Wall of Flesh"
'[菜单] BOSS图鉴（困难模式）': "[Menu] Boss Checklist (Hardmode)"
点击查看困难模式的BOSS图鉴: "Click to view the Hardmode Boss Checklist."
'[信息] 召唤方式': "[Info] Summoning Method"
于祭坛中制作史莱姆王冠: "Craft a Slime Crown at an Altar."
随时使用即可召唤: "Can be used at any time to summon."
'[信息] 攻击方式': "[Info] Attack Patterns"
向玩家跳跃；偶尔缩小至消失后重新出现在玩家位置: "Leaps toward the player; occasionally shrinks to disappear and teleports onto the player's location."
受击时会生成一些史莱姆: "Spawns some slimes when damaged."
生命值降低到50%以下时召唤一枚王冠宝石，向玩家发射弹幕: "When health falls below 50%, it summons a Crown Jewel that fires projectiles at the player."
'[信息] 打法攻略': "[Info] Strategy Guide"
作为最简单的BOSS之一，本BOSS战难度较低: "As one of the simplest bosses, this battle is relatively easy."
钨钢套装，沙漠巡游者套装或矿物套装表现均可: "Wulfrum armor, Desert Prowler armor, or generic ore armor sets all perform well."
治疗药水与增益药水可以进一步降低难度: "Healing and buff potions can ease the fight even further."
推荐使用敏捷药水和食物以更好地规避王冠宝石的弹幕: "Swiftness Potions and food items are recommended to better evade the Crown Jewel's projectiles."
点击返回BOSS图鉴: "Click to return to the Boss Checklist."
于祭坛中制作荒漠吊坠: "Craft a Desert Medallion at an Altar."
在沙漠中随时使用即可召唤: "Can be used at any time in the Desert to summon."
生成时召唤两条黄沙恶虫: "Summons two Desert Nuisances upon spawning."
本体与黄沙恶虫均会冲向玩家进行攻击: "Both the main body and the Desert Nuisances will charge toward the player to attack."
本体每第4次冲刺将释放一些极不准确的弹幕: "The main body fires a cluster of highly inaccurate projectiles on every 4th charge."
本体机动性随生命降低而提高: "The main body's mobility increases as its health decreases."
钨钢，沙漠巡游者，忍者或矿物套装表现均可: "Wulfrum, Desert Prowler, Ninja, or generic ore armor sets all perform well."
推荐优先击杀黄沙恶虫以避免在BOSS战中后期手忙脚乱: "It is recommended to defeat the Desert Nuisances first to prevent getting overwhelmed later in the fight."
观察小地图以获取BOSS及黄沙恶虫的位置信息: "Keep an eye on the minimap to track the locations of the boss and the Desert Nuisances."
弹幕频率低，伤害不高且极其不准确，可酌情无视弹幕: "Projectiles are infrequent, deal low damage, and are highly inaccurate, so they can be ignored as needed."
蠕虫类敌人的最大威胁来源于头部的冲撞。尽可能避免直接被头部命中: "The biggest threat from worm-type enemies comes from head-on collisions. Avoid direct contact with the head at all costs."
于祭坛中制作节肢动物芽孢: "Craft Arthropod Sprouts at an Altar."
在丛林洞穴层使用即可召唤: "Use in the Underground Jungle layer to summon."
向玩家跳跃: "Leaps toward the player."
向上方发射逐渐下落的孢子: "Launches falling spores upwards into the air."
挑战荒漠灾虫获得的胜潮套装可以提供额外的护甲和生命再生: "The Victide armor set obtained from defeating the Desert Scourge provides extra defense and life regeneration."
敏捷药水与食物可增加移速以便躲避跳跃攻击: "Swiftness Potions and food items increase movement speed to help dodge leaping attacks."
钓鱼获得的跳跃之瓶可以在此时期大幅提供机动性: "A Tsunami in a Bottle obtained from fishing can significantly boost your mobility at this stage."
于祭坛中制作可疑的眼球: "Craft a Suspicious Looking Eye at an Altar."
在夜晚使用即可召唤: "Use at night to summon."
'[信息] 攻击方式-第一阶段': "[Info] Attack Patterns - Phase 1"
第一阶段时，BOSS的攻击方式如此循环：: "During Phase 1, the Boss's attack pattern cycles as follows:"
进行三次冲撞: "Executes three ramming charges."
试图悬浮在玩家上空并召唤仆从: "Attempts to hover above the player and summon Servants of Cthulhu."
生命值降低到75%以下时原地停滞，召唤大量仆从，并在不久后进入二阶段: "When health falls below 75%, it pauses in place, summons a mass of servants, and soon transitions into Phase 2."
'[信息] 攻击方式-第二阶段': "[Info] Attack Patterns - Phase 2"
第二阶段时，BOSS的攻击方式如此循环：: "During Phase 2, the Boss's attack pattern cycles as follows:"
悬浮在玩家上空（若生命值低于65%则改为两次随机冲刺）: "Hovers above the player (switches to two random dashes if health falls below 65%)."
生命值降低到55%以下时进入三阶段: "Enters Phase 3 when health falls below 55%."
'[信息] 攻击方式-第三阶段': "[Info] Attack Patterns - Phase 3"
第三阶段时，BOSS的攻击方式如此循环：: "During Phase 3, the Boss's attack pattern cycles as follows:"
进行五次冲撞: "Executes five ramming charges."
悬浮在玩家上空（若生命值低于40%则改为一次迅速的水平冲刺）: "Hovers above the player (switches to a single rapid horizontal dash if health falls below 40%)."
在夜幕降临（BGM改变）时开始准备挑战BOSS以保证时间充足: "Begin preparing for the boss challenge right as night falls (when the BGM changes) to ensure you have enough time."
尝试在冲刺开始前起跳，通过下落躲避冲刺: "Try jumping right before a charge begins, using your descent to evade the dash."
于祭坛中制作虫饵: "Craft Worm Food at an Altar."
在腐化之地使用即可召唤: "Use in the Corruption to summon."
BOSS会向玩家冲撞: "The Boss will charge at the player."
此外，体节被击败后BOSS将分为两部分，各自的头部将带领剩余的体节分别移动: "Additionally, when segments are destroyed, the Boss will split into multiple sections, each with its own head leading the remaining segments."
BOSS越短，机动能力越高: "The shorter the boss gets, the higher its mobility becomes."
哥布林军团事件后哥布林工匠将开始出售火箭靴: "The Goblin Tinkerer will begin selling Rocket Boots after the Goblin Army event."
考虑在火箭靴下装备跳跃之瓶以免意外承受摔落伤害: "Consider equipping a Cloud in a Bottle (or similar) alongside Rocket Boots to avoid accidental fall damage."
敏捷药水与食物可增加移速以便躲避短小体节的迅速冲撞: "Swiftness Potions and food items increase movement speed to help dodge the fast dashes of short segments."
腐化之地会刷新腐化囊: "Teratomas will spawn in the Corruption."
破坏腐化囊后即可挑战BOSS: "Destroying a Teratoma will summon the Boss."
偶尔缩小至消失后重新出现在随机的位置: "Occasionally shrinks to disappear and teleports to a random location."
不会移动；BOSS的召唤物将对玩家发起攻击: "Remains stationary; the Boss's summons will attack the player instead."
BOSS的生命值每降低5%将召唤一波新的怪物: "Spawns a new wave of minions for every 5% of health lost."
生命值低于80%时，进入第二阶段: "Enters Phase 2 when health falls below 80%."
缩小至消失后重新出现在随机的位置: "Shrinks to disappear and teleports to a random location."
向玩家移动；此时是输出的最佳时机。移动速度随血量降低而增加: "Moves toward the player; this is the best window to deal damage. Its movement speed increases as its health drops."
围绕玩家高速旋转以迷惑玩家: "Orbits the player at high speeds to confuse them."
向玩家发起冲刺；冲刺时召唤少量怪物: "Dashes at the player, spawning a few minions during the charge."
'[信息] BOSS仆从': "[Info] Boss Minions"
BOSS可以在全时期召唤以下四种仆从：: "The Boss can summon the following four types of minions throughout the entire fight:"
噬魂怪：腐化之地常态存在的敌怪；缓慢飞向玩家: "Eater of Souls: A common Corruption enemy; slowly flies toward the player."
吞噬者：腐化之地常态存在的蠕虫敌怪: "Devourer: A common worm enemy found in the Corruption."
暗之心：试图悬浮在玩家上空并降下暗影之雨: "Dark Heart: Attempts to hover above the player and rain down Shadow Rain."
沼泽之眼：飞向玩家，并在被击败后留下暗影云，在原地降下暗影之雨: "Dank Creeper: Flies toward the player and leaves a Shadow Cloud upon defeat, raining down Shadow Rain on the spot."
第一阶段BOSS还将生成腐化球：一开始生成15个，召唤仆从时额外生成5个: "During Phase 1, the Boss will also generate Rotten Balles: 15 initially, and 5 more whenever minions are summoned."
腐化球会向玩家发射带有预判性质的弹幕: "Rotten Balles will fire predictive projectiles targeting the player's movement."
胜潮套装可以提供额外的护甲和生命再生: "The Victide armor set provides extra defense and life regeneration."
暗影套装可以提供更高的机动性和防御力: "Shadow armor provides higher mobility and defense."
黑曜石和流星套装可以提供更高输出: "Obsidian and Meteor armor sets provide higher damage output."
使用对群能力较强的武器能够极大地帮助清理小怪: "Using weapons with good crowd control or AoE capability will greatly help clear out the minions."
菌生蟹掉落的真菌块可以限制小怪同时提供额外续航: "Fungal Clumps dropped by Crabulon can hinder minions while providing extra health sustain."
一阶段的威胁主要来源于腐化球的预判攻击；注意及时变向: "The main threat in Phase 1 comes from the predictive attacks of the Rotten Balles; make sure to change directions unpredictably."
二阶段的冲撞攻击时通过小地图留意BOSS的位置: "During Phase 2's dash attacks, keep an eye on the boss's position using the minimap."
夜晚与主城裁缝NPC对话并选择“诅咒”: "Talk to the Clothier NPC in the town at night and select 'Curse'"
使用四只手轮流挥向玩家: "Uses four hands to take turns swinging at the player"
准备传送；准备时本体与传送位置均会多次产生爆炸粒子效果: "Prepares to teleport; during preparation, both the main body and the teleport location will produce multiple explosion particle effects"
传送，射出大量弹幕并开始冲向玩家: "Teleports, fires a large amount of projectiles, and begins charging at the player"
第一阶段时本体无法受到伤害；有一只手被击败后开始每秒发射2次弹幕: "During Phase 1, the main body is immune to damage; after one hand is defeated, it begins firing projectiles twice per second"
四只手被击败后，进入第二阶段: "After all four hands are defeated, it enters Phase 2"
每秒发射2次弹幕；生命值少于40%时改为每秒5次: "Fires projectiles twice per second; changes to 5 times per second when health falls below 40%"
传送，发射弹幕并开始冲向玩家: "Teleports, fires projectiles, and begins charging at the player"
生命值降低到25%以下时使四只手一起重生，仅能发动一次: "Respawns all four hands together when health drops below 25%, can only trigger once"
天蓝套装可以提供大量机动性，且数值较优: "The Skyline armor set provides a massive boost to mobility and has superior stats"
熔岩套装坦度极佳，可提供高额容错: "The Molten armor set offers excellent tankiness and a high margin for error"
（警告：白天时BOSS将获得极高的伤害与防御）: "(Warning: During the day, the BOSS gains extremely high damage and defense)"
敏捷药水与食物可增加移速以便躲避冲锋攻击: "Swiftness Potions and food can increase movement speed to help dodge dash attacks"
于祭坛中制作过载淤泥: "Craft Overloaded Sludge at an Altar"
任意时间地点均可使用: "Can be used at any time and location"
第一阶段时，黑檀与血化史莱姆将造成主要威胁: "During Phase 1, the Ebonian and Crimulan Slimes pose the primary threat"
两者均会跃向玩家，落地时发射大量预判弹幕: "Both will leap toward the player, firing a large amount of predictive projectiles upon landing"
距离玩家较远时跳跃能力受到极大增强: "Their leaping ability is greatly enhanced when far away from the player"
两者均可在生命值较低时分裂2次；分裂后的史莱姆更小，平分剩余生命值且发射弹幕数量减少: "Both can split up to 2 times when health is low; the split slimes are smaller, share the remaining health equally, and fire fewer projectiles"
此时，史莱姆之神本体将向玩家径直发起冲撞: "Meanwhile, the Slime God core will charge directly at the player"
所有史莱姆被击败后进入第二阶段: "Enters Phase 2 after all slimes are defeated"
第二阶段时，史莱姆之神本体的攻击方式如此循环：: "During Phase 2, the Slime God core's attack pattern cycles as follows:"
快速根据玩家的加速度发射预判弹幕；每次发射一枚: "Rapidly fires predictive projectiles based on the player's acceleration; one projectile per shot"
进行一次预判冲撞: "Performs a predictive dash"
此时击败仅剩的本体即可结束战斗: "At this point, defeating the remaining core will end the battle"
天蓝，熔岩与骷髅王后可制作的死灵套装均有不错的表现: "Skyline, Molten, and post-Skeletron craftable Necro armor sets all perform quite well"
火箭靴/天羽之翼，气球束等饰品能极大地帮助躲避弹幕: "Accessories such as Rocket Boots / Skyline Wings and the Bundle of Balloons greatly help in dodging projectiles"
利用本BOSS学习如何骗预判将极大地帮助挑战中后期BOSS: "Using this BOSS to learn how to bait predictive attacks will immensely help when challenging mid-to-late game bosses"
亦可观察根据当前移动方向预判而来的弹道以便及时变向: "You can also observe the incoming predictive trajectories based on your current movement to change directions in time"
尽可能使用克苏鲁之眼盾的冲撞来躲避第一阶段BOSS的直冲: "Use the Shield of Cthulhu's dash as much as possible to dodge the Phase 1 BOSS's direct charges"
即将进入第二阶段时注意观察BOSS位置: "Keep a close eye on the BOSS's position when it is about to enter Phase 2"
第二阶段时频繁在左右移动之间切换骗预判弹幕，利用冲刺躲避冲撞: "During Phase 2, frequently switch between moving left and right to bait predictive projectiles, and use dashes to dodge charges"
尽可能不要受到伤害；本BOSS的所有弹幕和史莱姆之神本体都有概率造成扭曲DEBUFF: "Try your best to avoid taking damage; all projectiles from this BOSS and the Slime God core have a chance to inflict the Distorted debuff"
扭曲DEBUFF会极大限制垂直方向走位空间: "The Distorted debuff will severely limit your vertical movement space"
地狱的巫毒恶魔掉落向导巫毒娃娃: "Voodoo Demons in the Underworld drop the Guide Voodoo Doll"
在向导存活时丢入岩浆召唤血肉之墙: "Throw it into lava while the Guide is alive to summon the Wall of Flesh"
'*注：血肉之墙将生成在巫毒娃娃焚毁的方向并向玩家逼近*': "*Note: The Wall of Flesh will spawn in the direction where the Voodoo Doll was destroyed and sweep toward the player*"
BOSS生成时召唤数个饿鬼飞向玩家；随后每2.5秒召唤一个饿鬼: "Summons several The Hungry to fly toward the player upon spawning; thereafter, summons one The Hungry every 2.5 seconds"
BOSS将前推进；速度随生命值降低而增加: "The BOSS will sweep forward; its speed increases as its health decreases"
推进方向在召唤时即刻确定，随后不再更改: "The direction of advance is locked instantly upon summoning and will not change afterward"
眼睛会向玩家发射激光，嘴偶尔发射略微追踪的恶魔之镰: "The eyes fire lasers at the player, while the mouth occasionally spits slightly homing Demon Scythes"
玩家在血肉之墙身后时会受到超高攻击伤害和击退: "Players behind the Wall of Flesh will suffer extremely high contact damage and knockback"
玩家远离超过48格时会狂暴，极大提升攻击速度与移动速度: "Enrages if the player is more than 48 blocks away, drastically increasing its attack and movement speed"
玩家远离超过100格时会被瞬间秒杀: "Instantly kills the player if they are more than 100 blocks away"
挑战前需大体规划好移动路线，以免碰到地狱中的柱子无法移动: "Plan out your movement route beforehand to avoid getting stuck on ruined pillars in the Underworld"
斯塔提斯套装提供的防御较为出色: "The Statigel armor set provides excellent defense"
天蓝套装的移动速度也可以考虑在内: "The movement speed from the Skyline armor set can also be considered"
注意避免离BOSS过远导致狂暴；狂暴在玩家返回48格内后依然会保持一秒: "Be careful not to get too far from the BOSS and trigger its enrage; the enrage persists for one second even after the player returns within 48 blocks"
可考虑使用镇静药水、禅定药水等方式进一步减少小怪对BOSS战的干扰: "Consider using Calming Potions or Zen Potions to further minimize enemy interference during the BOSS battle"
多人挑战时，在跑道方向的较远处设置床以便复活后更可能重新加入战斗: "In multiplayer, place beds further down the runway path so players can rejoin the fight more easily after respawning"
