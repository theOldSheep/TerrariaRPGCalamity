'[信息] 月球领主': "[Info] Moon Lord"
点击查看困难模式前的BOSS图鉴: "Click to view the Pre-Hardmode Boss Checklist"
'[菜单] BOSS图鉴（月球领主后）': "[Menu] Boss Checklist (Post-Moon Lord)"
点击查看月球领主后的BOSS图鉴: "Click to view the Post-Moon Lord Boss Checklist"
挖掘珍珠石有概率掉落明胶水晶: "Mining Pearlstone has a chance to drop a Gelatin Crystal"
水晶也可通过合成获得: "The crystal can also be obtained through crafting"
在神圣之地使用召唤史莱姆皇后: "Use in the Hallow to summon Queen Slime"
向玩家跳跃3次，此时可以被方块阻挡: "Leaps toward the player 3 times, during which it can be blocked by solid blocks"
穿过方块飞向玩家上方并砸下；下砸时接触伤害有所提升: "Flies through blocks to get above the player and slams down; contact damage is increased during the slam"
缩小至消失后重新出现在玩家位置: "Shrinks until it disappears, then teleports back onto the player's location"
此外，BOSS会召唤三种仆从帮助攻击玩家: "Additionally, the BOSS summons three types of minions to assist in attacking the player"
血量降至50%后进入第二阶段: "Enters Phase 2 after health drops below 50%"
飞向玩家上方，发射大量弹跳弹幕: "Flies above the player, firing a large amount of bouncing projectiles"
吼叫并垂直下砸；下砸时接触伤害有所提升: "Regrows/Roars and slams down vertically; contact damage is increased during the slam"
BOSS仍然会召唤三种仆从帮助攻击玩家: "The BOSS will still summon three types of minions to assist in attacking the player"
飞翔史莱姆：飞向玩家，试图造成接触伤害: "Flying Slime: Flies toward the player, attempting to deal contact damage"
水晶史莱姆：向玩家发射大量受重力影响的水晶弹幕: "Crystal Slime: Fires a large amount of gravity-affected crystal projectiles at the player"
弹力史莱姆：向玩家发射受重力影响的弹力弹幕: "Bouncy Slime: Fires gravity-affected bouncing projectiles at the player"
挑战前需准备好平整的地形: "Prepare flat terrain before attempting the challenge"
BOSS战中，蜘蛛、软壳（移速较低）和钴套装效果均可: "During the BOSS battle, Spider, Mollusk (lower movement speed), and Cobalt armor sets all yield decent results"
尽量考虑易于清理小怪的武器以免手忙脚乱: "Prioritize weapons that can easily clear minions to avoid getting overwhelmed"
血肉之墙后的各种环境有全新的掉落物以及合成的物品: "Various biomes post-Wall of Flesh feature brand-new drops and craftable items"
光明/暗影钥匙召唤的宝箱怪也会掉落强力武器和饰品: "Biomes Mimics summoned via Keys of Light/Night also drop powerful weapons and accessories"
在BOSS进行下砸攻击前稍微离开地面（速度要合理，避免被BOSS径直撞到）: "Get slightly off the ground before the BOSS performs its slam attack (maintain a reasonable speed to avoid getting hit head-on)"
在BOSS进行下砸攻击时下落并冲刺躲避: "Fall and dash to evade when the BOSS performs its slam attack"
铁砧处制作机械魔眼: "Craft Mechanical Eye at an Anvil"
在夜晚召唤双子魔眼: "Summon The Twins at night"
'[信息] 攻击方式-阶段切换': "[Info] Attack Pattern - Phase Transition"
两只眼球均有相似的阶段切换逻辑: "Both eyes share similar phase transition logic"
生成时，两者皆为第一阶段: "Upon spawning, both eyes start in Phase 1"
当生命值降到70%以下时，进入第二阶段: "Enters Phase 2 when HP drops below 70%"
当生命值降到25%以下或另一只眼球被击败后，进入第三阶段: "Enters Phase 3 when HP drops below 25% or when the other eye is defeated"
当一只眼球处于更高阶段时，它暂时不会受到伤害: "When one eye is in a higher phase, it temporarily becomes immune to damage"
'[信息] 攻击方式-激光眼': "[Info] Attack Pattern - Retinazer"
第一阶段：: "Phase 1:"
在玩家的斜上方发射激光: "Fires lasers from diagonally above the player"
向玩家进行三次长距离冲刺: "Performs three long-distance dashes towards the player"
第二阶段：: "Phase 2:"
在玩家的正上方发射激光: "Fires lasers from directly above the player"
在玩家的水平方向快速发射激光: "Rapidly fires lasers horizontally at the player"
第三阶段：: "Phase 3:"
向玩家进行三次长距离冲刺；第一次冲刺时释放五枚追踪弹幕: "Performs three long-distance dashes towards the player; releases five homing projectiles during the first dash"
'[信息] 攻击方式-魔焰眼': "[Info] Attack Pattern - Spazmatism"
在玩家的水平方向发射火球: "Fires cursed fireballs horizontally at the player"
向玩家进行八次短距离冲刺: "Performs eight short-distance dashes towards the player"
向玩家缓慢移动并喷射大量火球: "Slowly moves towards the player while spewing a massive stream of fireballs"
快速冲撞五次: "Rapidly dashes five times"
向玩家下方移动并射出五枚追踪弹幕: "Moves below the player and fires five homing projectiles"
快速冲撞三次: "Rapidly dashes three times"
史莱姆皇后掉落的水晶刺客套装可以提供冲刺，解放克苏鲁之眼盾的饰品栏: "The Crystal Assassin armor dropped by Queen Slime provides a dash, freeing up the accessory slot used by the Shield of Cthulhu"
肉后的翅膀在此BOSS战中更加重要；垂直方向走位可以轻松躲避大部分弹幕: "Hardmode wings are crucial in this boss fight; moving vertically makes it easy to dodge most projectiles"
在飞行的顶端和底端（接触地面刷新飞行时间时）使用冲刺可以保持高速移动: "Dashing at the peak and bottom of your flight (when touching the ground to refresh flight time) helps maintain high movement speed"
铁砧处制作极寒之匙: "Craft Cryo Key at an Anvil"
在雪原召唤极地之灵: "Summon Cryogen in the Snow biome"
向玩家发射两次六角形弹幕，间隔较长: "Fires two hexagonal projectile patterns at the player with a long interval"
向玩家发射三次六角形弹幕，间隔较短: "Fires three hexagonal projectile patterns at the player with a short interval"
径直冲向玩家: "Dashes straight towards the player"
此外，所有阶段中，BOSS都会定时释放数个冰霜炸弹: "Additionally, during all phases, the boss periodically releases several Frost Bombs"
冰霜炸弹会在短暂延迟后爆炸成大量受重力影响的冰片，注意适当远离: "Frost Bombs explode after a short delay into numerous gravity-affected ice shards; make sure to keep a reasonable distance"
所有阶段中，BOSS都会召唤冰川护盾替自身抵挡伤害；护盾破碎12秒后再生: "During all phases, the boss summons a Glacial Shield to block damage; the shield regenerates 12 seconds after being shattered"
飞向玩家并发射两次六角形弹幕: "Flies towards the player and fires two hexagonal projectile patterns"
原地停留，发射两次六角形弹幕后径直向玩家冲刺: "Stays in place, fires two hexagonal projectile patterns, then dashes straight towards the player"
再次原地停留，发射两次六角形弹幕后径直向玩家冲刺: "Stays in place again, fires two hexagonal projectile patterns, then dashes straight towards the player"
生命值低于60%时，进入第三阶段: "Enters Phase 3 when HP drops below 60%"
缓慢飞向玩家并发射六角形弹幕: "Slowly flies towards the player while firing hexagonal projectile patterns"
定时传送到玩家附近的位置；传送前会在目标位置显示多次爆炸粒子: "Periodically teleports near the player; multiple explosion particles will appear at the destination before teleporting"
生命值低于50%时，进入第四阶段: "Enters Phase 4 when HP drops below 50%"
'[信息] 攻击方式-第四阶段': "[Info] Attack Pattern - Phase 4"
以适中的速度向玩家逼近: "Approaches the player at a moderate speed"
在距离玩家较近时直线向玩家冲刺: "Dashes in a straight line towards the player when close"
生命值低于35%时，进入第五阶段: "Enters Phase 5 when HP drops below 35%"
'[信息] 攻击方式-第五阶段': "[Info] Attack Pattern - Phase 5"
以适中的速度向玩家的上方逼近: "Approaches above the player at a moderate speed"
短暂停留后进行三连冲刺，速度稍快: "Pauses briefly, then performs three consecutive dashes at a slightly faster speed"
冲刺开始时发射4枚具有追踪能力的弹幕: "Fires 4 homing projectiles at the start of the dash"
生命值低于25%时，进入第六阶段: "Enters Phase 6 when HP drops below 25%"
'[信息] 攻击方式-第六阶段': "[Info] Attack Pattern - Phase 6"
短暂停留后进行三连冲刺，速度适中但间隔稍短: "Pauses briefly, then performs three consecutive dashes at a moderate speed but with shorter intervals"
冲刺开始时发射8枚具有追踪能力的弹幕: "Fires 8 homing projectiles at the start of the dash"
挑战前建议清理出大量的平整空地: "It is recommended to clear out a large, flat open area before challenging the boss"
BOSS和弹幕会造成冷冻DEBUFF，短时间内减少大量移动能力，注意躲避: "The boss and its projectiles inflict the Chilled debuff, heavily reducing movement capabilities for a short duration; focus on dodging"
由于BOSS的冰川护盾，尽可能将火力集中在护盾破损时造成有效输出: "Due to the Glacial Shield, try your best to concentrate your firepower when the shield is broken to maximize effective DPS"
躲避六角形弹幕时左右抖动可骗预判降低难度: "When dodging the hexagonal patterns, weaving left and right can throw off its predictive aiming to lower the difficulty"
注意与BOSS的冲刺终点始终保持合理的距离: "Be careful to always maintain a reasonable distance from where the boss ends its dash"
第四阶段最为轻松，可酌情考虑暂缓攻击BOSS等待状态恢复: "Phase 4 is the easiest; you can consider halting your attacks to recover your health/buffs"
铁砧处制作海鲜饵料: "Craft Seafood Bait at an Anvil"
在硫磺海召唤渊海灾虫: "Summon Aquatic Scourge in the Sulphurous Sea"
向玩家移动和冲刺: "Moves and dashes towards the player"
在接近玩家后吐出大量酸雾: "Spews a massive cloud of acid mist upon getting close to the player"
周期性从头到尾射出追踪毒牙: "Periodically fires homing teeth from its head down to its tail"
机动能力随生命值降低而略微增加: "Mobility increases slightly as its health decreases"
挑战前建议建造出大型平台（建议使用玻璃平台物品）提供走位空间: "It is recommended to build a large platform arena (Glass Platforms are recommended) before the fight to provide room for maneuvering"
若已战胜双子魔眼，秘银套装是不错的选择: "If you have defeated The Twins, Mythril armor is a solid choice"
若已战胜双子魔眼和极地之灵，代达罗斯套装效果拔群: "If you have defeated both The Twins and Cryogen, Daedalus armor is exceptionally effective"
使用对群能力较强的武器；对单类武器输出极其乏力: "Use weapons with strong AoE/piercing capabilities; single-target weapons deal extremely underwhelming damage"
与其余长直类敌人相同，尽可能避免被头部直接命中: "Like other worm-type enemies, avoid getting hit directly by its head at all costs"
铁砧处制作机械蠕虫: "Craft Mechanical Worm at an Anvil"
在夜间召唤毁灭者: "Summon The Destroyer at night"
拥有探针的体节会向玩家发射激光: "Segments equipped with Probes fire lasers at the player"
生命值低于50%时没有探针的体节也可以发射激光: "Segments without Probes can also fire lasers when HP drops below 50%"
机动能力随生命值降低而增加: "Mobility increases as health decreases"
拥有探针的体节受到伤害有可能释放探针: "Segments with Probes may release them upon taking damage"
这些探针会游离并向玩家发射激光: "These Probes will break away and fire lasers at the player"
挑战前强烈建议击败渊海灾虫；深海权杖与海之烧灼均可对长直类敌人造成巨额伤害: "It is highly recommended to defeat the Aquatic Scourge first; Deep Sea Staff and Seas Searing can deal colossal damage to worm enemies"
代达罗斯套装和秘银套装都是不错的选择: "Both Daedalus armor and Mythril armor are good choices"
可以考虑先利用高频低伤武器火力覆盖大量体节以引出探针: "Consider using high-frequency, low-damage weapons to cover multiple segments first to draw out the Probes"
击溃大部分探针后，BOSS战后半段即可减少不必要的干扰: "Destroying most Probes early on reduces unnecessary interference during the latter half of the boss fight"
地狱熔炉处制作焦炭玩偶: "Craft Charred Idol at a Hellforge"
在硫火之崖召唤硫磺火元素: "Summon Brimstone Elemental in the Brimstone Crag"
'[信息] 攻击模式切换': "[Info] Attack Pattern - Behavior Shift"
BOSS有三种攻击模式；: "The boss has three attack behaviors:"
漂浮，悬浮，激光: "Hovering, Stationary, and Laser"
激光模式仅在半血以下开始使用: "The Laser phase is only used when health is below 50%"
'[信息] 攻击模式-漂浮': "[Info] Attack Pattern - Hovering"
试图漂浮在玩家上方: "Attempts to hover above the player"
交替射出六角弹幕与速度更快的单个爆炸弹幕: "Alternates between firing hexagonal projectile patterns and faster, individual explosive projectiles"
交替六次后进入下一攻击模式: "Transitions to the next attack behavior after alternating six times"
'[信息] 攻击模式-悬浮': "[Info] Attack Pattern - Stationary"
速度降低，最后停止移动: "Slows down and eventually stops moving entirely"
同时射出六角弹幕与数个紧密的深渊亡魂: "Simultaneously fires hexagonal projectile patterns and tightly packed Brimstone Hellblasts"
深渊亡魂的速度会随玩家距离的增加而大幅度增加: "The speed of the Brimstone Hellblasts increases drastically the further away the player is"
发射六次后进入下一攻击模式: "Transitions to the next attack behavior after firing six times"
'[信息] 攻击模式-激光': "[Info] Attack Pattern - Laser"
试图预判玩家的移动位置并显示射线瞄准方向: "Attempts to predict the player's movement and displays a targeting telegraph beam"
经过两次提示后发射真正的激光并造成伤害判定: "Fires the actual damaging laser after two telegraph prompts"
播放音效时BOSS血条也会变色；激光于血条颜色变回黄色时射出: "The boss's health bar changes color when the sound effect plays; the laser fires the moment the health bar turns back to yellow"
发射三次后进入下一攻击模式: "Transitions to the next attack behavior after firing three times"
挑战前建议清理出硫火之崖的地面提供走位空间: "It is recommended to clear out the terrain in the Brimstone Crag before the fight to give yourself room to move"
若已战胜两个机械BOSS，精金套装和武器是很好的选择: "If you have defeated two Mechanical Bosses, Adamantite armor and weapons are excellent choices"
代达罗斯套装也可供选择: "Daedalus armor is also a viable option"
漂浮模式：保持略微变向移动，不要直线折返以免被滞留爆炸弹击中: "Hovering phase: Keep changing your movement direction slightly; avoid turning straight back to prevent getting hit by lingering explosive projectiles"
悬浮模式：保持适当的距离，过近会导致六角星弹幕难以躲避，过远会导致深渊亡魂拥有疯狂的速度: "Stationary phase: Maintain a proper distance; being too close makes the hexagonal stars impossible to dodge, while being too far gives the Brimstone Hellblasts insane speed"
激光模式：在BOSS血条第三次变红时冲刺，变黄后反向移动骗预判: "Laser phase: Dash right as the boss's health bar turns red for the third time, then move in the opposite direction when it turns yellow to throw off its prediction"
铁砧处制作机械骷髅头: "Craft Mechanical Skull at an Anvil"
在夜晚召唤机械骷髅王: "Summon Skeletron Prime at night"
'[信息] 攻击方式-头部': "[Info] Attack Pattern - Prime Head"
在手没有被全部击溃前，头部只会向玩家移动: "Before all limbs are destroyed, the head will only move toward the player"
在手被全部击溃后：: "After all limbs are destroyed:"
在玩家斜上方转圈，射出追踪头骨: "Circles diagonally above the player, firing homing skulls"
飞向玩家正上方，射出追踪火箭；此阶段仅在小于25%生命值后启用: "Flies directly above the player, firing homing rockets; this phase triggers only when health drops below 25%"
快速飞向玩家，在低于50%生命值时发射激光: "Flies rapidly toward the player, firing lasers when health drops below 50%"
“叟没了就好点了，可以庄↑心地~躲这个佝偻头了”: "'Once the limps are gone it gets better, then you can fo↑cus~ on dodging this sgeletron head'"
'[信息] 攻击方式-机械锯': "[Info] Attack Pattern - Prime Saw"
闲置时在头附近待命，攻击时高速径直飞向玩家: "Loiters near the head when idle; flies straight towards the player at high speed when attacking"
随存活的手数量减少，闲置时间减少且飞行速度增加: "As fewer limbs remain alive, its idle duration decreases and its flight speed increases"
'[信息] 攻击方式-机械钳': "[Info] Attack Pattern - Prime Vice"
闲置时在头附近待命，攻击时以超高速度径直飞向玩家: "Loiters near the head when idle; flies straight towards the player at extremely high speed when attacking"
相较机械锯，闲置模式转换更快且飞行速度上限更高: "Compared to the Prime Saw, its idle transitions are quicker and its maximum flight speed is higher"
'[信息] 攻击方式-机械激光': "[Info] Attack Pattern - Prime Laser"
向玩家一次性发射大量激光束: "Fires a large volley of laser beams at the player all at once"
发射频率随存活的手数量减少而增加: "Firing frequency increases as fewer limbs remain alive"
'[信息] 攻击方式-机械炮': "[Info] Attack Pattern - Prime Cannon"
发射火箭，在单发与大量齐射之间交替进行: "Fires rockets, alternating between single shots and massive volleys"
火箭会在发射半秒后急速飞行并爆炸: "Rockets accelerate rapidly and explode half a second after being fired"
随存活的手数量减少，发射频率大幅增加: "Firing frequency increases drastically as fewer limbs remain alive"
作为机械三王中相对具有挑战性的BOSS，建议作为三王中最后一个挑战: "As the most challenging of the three Mechanical Bosses, it is recommended to tackle Skeletron Prime last"
届时，玩家应该拥有精金/寒霜套装并且击败大量其他困难模式BOSS: "By then, players should ideally possess Adamantite/Frost armor and have defeated multiple other Hardmode bosses"
手部存活时可适当考虑对群/半对群武器；仅剩头部时建议使用强对单武器: "Consider using AoE or semi-AoE weapons while the limbs are alive; switch to high single-target DPS weapons when only the head remains"
除非移动力超高的极端配装，强烈建议优先击杀两只近战手臂以免出现无法躲避的情况: "Unless running an extreme high-mobility build, it is highly recommended to prioritize killing the two melee arms (Saw and Vice) to prevent unavoidable damage situations"
对于机械炮的火箭要格外注意；弹道末端的爆炸有可能带来意外惊喜: "Pay extra attention to the Prime Cannon's rockets; the explosions at the end of their trajectories can catch you off guard"
仅剩骷髅头时，建议在旋转发射弹幕阶段下降，其他阶段向上飞行: "When only the head remains, it is advised to descend during its spinning projectile phase and fly upwards during other phases"
“又是这个囊的过分的啵丝”: "'Not this absurdly tanky boss again...'"
丛林洞穴层生成世纪之花花苞: "Plantera's Bulbs spawn in the Underground Jungle layer"
挖掘后召唤世纪之花: "Mining it summons Plantera"
向玩家冲刺并发射种子和弹跳尖刺球: "Dashes at the player, firing seeds and bouncing spiky balls"
生命值降低到50%时，接触伤害提高，防御减少并释放大量触手: "When HP drops to 50%, contact damage increases, defense decreases, and she releases many tentacles"
生命值低于25%时，会额外放出滞留的孢子云: "When HP drops below 25%, she releases additional lingering spore clouds"
BOSS战的弹跳尖刺球和滞留孢子云都会逐渐增加场地中的危机: "Both the bouncing spiky balls and lingering spore clouds gradually increase the danger in the arena"
因此，寻找一片大规模的丛林地下洞穴（并酌情扩建）非常重要: "Therefore, finding a large underground Jungle cave (and expanding it as needed) is very important"
此时玩家应当击败机械三王，可以使用神圣锭和叶绿锭制作的武器护甲: "At this point, players should have defeated the Mech Bosses and can use weapons and armor crafted from Hallowed and Chlorophyte Bars"
BOSS战大部分时间建议使用强对单武器；清理触手时对群武器也同样重要: "Single-target weapons are recommended for most of the boss fight; however, crowd-control weapons are equally important for clearing tentacles"
大量的触手会变相增加BOSS冲刺时的碰撞范围: "The large number of tentacles indirectly increases the boss's hitbox while dashing"
由于BOSS倾向于跟随玩家，硫磺火元素掉落的地狱降临拥有夸张的输出上限: "Since the boss tends to follow the player, the Brimstone Elementalist's drop, Hellborn, has an absurdly high DPS ceiling"
可考虑使用镇静药水、禅定药水等方式进一步减少小怪（特指世纪之龟）对BOSS战的干扰: "Consider using Calming Potions or Zen Potions to further reduce interference from common mobs (specifically Derplings and Moss Hornets)"
秘银砧处制作荒芜之眼: "Craft the Eye of Desolation at a Mythril Anvil"
在夜晚召唤灾厄之眼: "Summons the Eye of Cthulhu / Calamitas Clone at night"
'[信息] 攻击方式-常态': "[Info] Attack Pattern - Normal State"
兄弟重生阶段前：: "Before the Brother Rebirth Phase:"
在玩家上方发射爆炸弹: "Fires explosive projectiles while hovering above the player"
在玩家水平方向发射深渊亡魂: "Fires Abyssal Dead souls horizontally at the player"
兄弟被击败后：: "After the brothers are defeated:"
向玩家预判冲撞: "Performs predictive dashes at the player"
向玩家发射预判弹幕: "Fires predictive projectiles at the player"
降低到70%生命时开启第一轮弹幕炼狱: "Triggers the first Bullet Hell phase when HP drops to 70%"
降低到40%生命时召唤兄弟: "Summons her brothers when HP drops to 40%"
降低到10%生命时开启第二轮弹幕炼狱: "Triggers the second Bullet Hell phase when HP drops to 10%"
'[信息] 攻击方式-弹幕炼狱I': "[Info] Attack Pattern - Bullet Hell I"
第一轮弹幕炼狱期间，BOSS会向上方发射主弹幕: "During the first Bullet Hell, the boss fires main projectiles upwards"
主弹幕会向玩家预判发射深渊亡魂: "The main projectiles fire predictive Abyssal Dead souls toward the player"
'[信息] 攻击方式-兄弟重生': "[Info] Attack Pattern - Brother Rebirth"
召唤“灾难”与“灾祸”: "Summons 'Cataclysm' and 'Catastrophe'"
“灾难”：与第二阶段激光眼类似，在玩家上方和水平方向发射激光: "'Cataclysm': Similar to Retinazer Phase 2, fires lasers from above and horizontally relative to the player"
“灾祸”：与第二阶段魔焰眼类似，向玩家喷吐大量火球后进行5次冲刺: "'Catastrophe': Similar to Spazmatism Phase 2, spews a barrage of fireballs at the player before dashing 5 times"
“灾祸”的第五次冲刺持续时间稍短于其余冲刺: "Catastrophe's fifth dash has a slightly shorter duration than the others"
“灾厄之眼”在此期间只会在玩家上方发射爆炸弹幕: "During this time, the Calamitas Clone will only fire explosive barrages from above the player"
'[信息] 攻击方式-弹幕炼狱II': "[Info] Attack Pattern - Bullet Hell II"
第二轮弹幕炼狱期间，BOSS会向下方发射主弹幕: "During the second Bullet Hell, the boss fires main projectiles downwards"
主弹幕会爆裂成带有预判性质的深渊亡魂: "The main projectiles split into predictive Abyssal Dead souls"
在BOSS使用爆炸弹幕攻击时，避免完全垂直移动: "Avoid moving completely vertically when the boss uses explosive barrages"
在“灾祸”存活时，切记留意冲刺次数；第五次冲刺开始后向冲刺反方向移动避免被火球灼烧: "While Catastrophe is alive, be sure to count the dashes; move in the opposite direction of the fifth dash to avoid getting burned by fireballs"
在略微离开地面的位置建造玻璃平台以更好地看清弹幕炼狱: "Build glass platforms slightly above the ground to see the Bullet Hell projectiles more clearly"
弹幕炼狱弹幕带有预判性质，注意变向移动和随机应变: "The Bullet Hell projectiles are predictive; be ready to change directions and adapt on the fly"
两兄弟被击败后，注意在灾厄之眼冲撞后冲刺保持距离并及时变向躲避预判弹幕: "After both brothers are defeated, remember to dash away to maintain distance after the Calamitas Clone charges, and change direction quickly to dodge predictive projectiles"
海洋中刷新“？？？”: "'???' spawns in the Ocean"
击杀后召唤阿娜希塔与利维坦: "Killing it summons Anahita and The Leviathan"
'[信息] 攻击方式-利维坦': "[Info] Attack Pattern - The Leviathan"
垂直与玩家对齐后水平冲刺一次；随着生命下降增加冲刺次数（70%两次，40%三次）: "Aligns vertically with the player, then dashes horizontally; dash frequency increases as HP drops (twice at 70%, three times at 40%)"
垂直与玩家对齐并发射巨大弹幕，一共十次: "Aligns vertically with the player and fires massive projectiles, ten times in total"
召唤两个深海吞食者冲向玩家；阿娜西塔生命值低于20%改为三个: "Summons two Deep Sea Devourers to charge at the player; increases to three if Anahita's HP is below 20%"
'[信息] 攻击方式-阿娜西塔': "[Info] Attack Pattern - Anahita"
在利维坦生命值大于70%时悬浮在玩家上方且不攻击: "Hovers passively above the player while The Leviathan's HP is above 70%"
阿娜西塔一共有以下的攻击模式，她会在其中随机切换：: "Anahita randomly cycles through the following attack patterns:"
射出大量追踪泡泡: "Fires a large barrage of homing bubbles"
冲刺三次，期间接触伤害增加50%: "Dashes three times, during which contact damage increases by 50%"
在玩家的周围向玩家发射水之枪/霜雾/魅惑之音弹幕: "Surrounds the player and fires Water Bolt, Frost Mist, or Sirensong projectiles"
理论上，在挑战本BOSS时玩家应当已击败灾厄之眼和世纪之花: "Theoretically, players should have already defeated the Calamitas Clone and Plantera before challenging this boss"
推荐使用掠夺者，硫火，蘑菇或幽灵套装: "Recommended Armor: Reaver, Brimstone, Shroomite, or Spectre sets"
使用战斗+虫潮药水可迅速刷新召唤物敌怪: "Using Battle and Zerg Potions can quickly spawn the required summoning enemy"
保持垂直移动（规避利维坦伤害）的同时进行小幅度水平移动（规避阿娜西塔弹幕）: "Maintain vertical movement (to avoid The Leviathan) while making minor horizontal adjustments (to dodge Anahita's projectiles)"
可考虑携带备用对群武器以应对大量的利维坦仆从: "Consider bringing a backup crowd-control weapon to deal with the influx of Leviathan minions"
建议饮用鱼鳃药水以便在不慎落水后仍有一战之力: "Drinking a Gills Potion is recommended so you can still fight effectively if you accidentally fall into the water"
秘银砧处制作星辉碎块: "Craft Astral Chunks at a Mythril Anvil"
夜晚在星辉瘟疫召唤白金星舰: "Summons Astrum Deus / Astrum Aureus in the Astral Infection biome at night"
'[信息] 攻击方式-充能': "[Info] Attack Pattern - Charging"
原地不动并向上发射追踪弹幕: "Stays stationary and fires homing projectiles upward"
片刻过后，进行一次传送并生成两只小白星: "After a brief moment, teleports and spawns two Astral Spits / Aureus Spawns"
小白星围绕玩家运动，在降低到半血以下时冲向玩家并爆炸（接触方块会提前引爆）: "The spawns orbit the player, dashing and exploding when below 50% HP (will detonate early if they touch blocks)"
充能时，BOSS的伤害减免和防御都会降低: "While charging, the boss's damage reduction (DR) and defense are significantly reduced"
传送后不久将开始爬行攻击: "Shortly after teleporting, it will begin its crawling attack"
'[信息] 攻击方式-爬行': "[Info] Attack Pattern - Crawling"
向玩家爬行前进并发射星型弹幕: "Crawls toward the player while firing astral star projectiles"
发射第六次时马上进入跳跃攻击: "Immediately transitions into a jumping attack after the sixth shot"
移动速度将随生命值降低而增加: "Movement speed increases as HP decreases"
'[信息] 攻击方式-跳跃': "[Info] Attack Pattern - Jumping"
向上跳跃，在空中会缓慢向玩家转向: "Leaps upward, slowly tracking and turning toward the player while airborne"
落地后发射一次星型弹幕: "Fires an astral star projectile upon landing"
完成六次跳跃后马上进入充能阶段: "Immediately enters the charging phase after completing six jumps"
注意在跳跃时和BOSS二人转绕圈，防止被骑脸输出: "Be sure to circle around the boss during its jumps to prevent getting sat on and taking massive damage"
丛林神庙内敌人掉落丛林蜥蜴电池: "Lihzahrd Temples enemies drop Lihzahrd Power Cells"
在神庙中召唤石巨人: "Summons Golem inside the Temple"
'[信息] 攻击方式-身体': "[Info] Attack Pattern - Body"
身体会跃向玩家攻击: "The body leaps toward the player to attack"
手部存活时会定期向玩家出拳: "Periodically punches at the player while the hands are still alive"
头部脱落后身体也会开始发射激光: "The body will also start firing lasers once the head detaches"
向玩家发射激光和弹跳火球: "Fires lasers and bouncing fireballs at the player"
受到足够伤害后会脱落，独自游离在玩家上方并继续发射弹幕: "Detaches after taking enough damage, floating independently above the player while continuing to fire projectiles"
本BOSS的难度来源于丛林神庙的探索；本体难度相对较低: "The difficulty of this boss lies in exploring the Lihzahrd Temple; the fight itself is relatively easy"
唯一的威胁来源于弹跳的火球；保持垂直和水平移动即可: "The only real threat comes from the bouncing fireballs; just maintain consistent vertical and horizontal movement"
第二阶段时，注意在下落到地面前往后冲刺并保持高速移动: "During Phase 2, be sure to dash backward before hitting the ground and maintain high speed"
尽量让BOSS直射火球的方向和墙体有合适的角度，防止反弹弹幕从身后击中: "Try to align yourself so the boss's fireballs hit the walls at angles that won't bounce directly back into you from behind"
丛林神庙的上两层建议脱下靴子进行探索，防止移速过快: "It is recommended to take off your boots when exploring the top two layers of the Lihzahrd Temple to prevent moving too fast into traps"
所有神庙迷宫均可通过跟着右边/左边墙壁一路找到下一层的入口: "You can navigate any Temple maze by hugging either the left or right wall continuously to find the entrance to the next floor"
刷取BOSS召唤物时需要战斗、虫潮药水；确保不要带着这些buff开始BOSS战: "Battle and Zerg Potions are useful for farming summoning items, but ensure you cancel these buffs before starting the boss fight"
注：可考虑多次击败BOSS以获得石巨人之眼、锯刃镐等重要物品: "Note: Consider defeating the boss multiple times to obtain key items like the Eye of the Golem and Picksaw"
秘银砧处制作瘟疫起动装置: "Craft the Abombination at a Mythril Anvil"
在丛林召唤瘟疫使者歌莉娅: "Summons The Plaguebringer Goliath in the Jungle"
'[信息] 攻击方式-冲撞': "[Info] Attack Pattern - Dash"
向玩家垂直方向对齐: "Aligns itself vertically with the player"
随后，在一声吼叫后进行冲锋: "Then, charges forward after letting out a roar"
冲锋五次后进入导弹攻击模式: "Enters Missile Attack Mode after dashing five times"
'[信息] 攻击方式-导弹': "[Info] Attack Pattern - Missiles"
在玩家上方飞行并射出导弹: "Flies above the player and fires missiles"
导弹会穿墙和爆炸: "Missiles pass through tiles and explode"
随后进入召唤攻击模式: "Then transitions into Summon Attack Mode"
'[信息] 攻击方式-召唤': "[Info] Attack Pattern - Summons"
移动速度逐渐降低并召唤仆从: "Slows down its movement speed and summons minions"
随后进入核弹攻击模式（第一形态则开始冲撞）: "Then enters Nuke Attack Mode (or reverts to dashing if in Phase 1)"
仆从均可击碎，会追踪玩家并在靠近时爆炸: "The minions can be destroyed; they home in on the player and explode when close"
制导瘟疫弹更快，爆炸半径较小且伤害较低: "Homing Plague Missiles are faster, with a smaller explosion radius and lower damage"
瘟疫之雷速度更慢且仅在第二阶段生成: "Plague Mines are slower and only spawn during Phase 2"
'[信息] 攻击方式-核弹': "[Info] Attack Pattern - Nuke"
在玩家上方来回飞行: "Flies back and forth above the player"
向玩家发射六角核弹集束: "Fires clusters of Plague Nukes at the player"
核弹会穿墙和爆炸: "The nukes pass through tiles and explode"
发射四次后进入冲撞攻击模式: "Reverts to Dash Attack Mode after firing four times"
击败石巨人后获得锯刃镐可以前往深渊挖掘熔渣锭制作渊泉套装: "After defeating Golem and obtaining the Picksaw, you can head to the Abyss to mine Scoria Ore to craft Hydrothermic armor"
甲虫套装以及世纪之花/灾厄之眼后的套装也可供选择: "Beetle armor or sets available post-Plantera/Calamitas Clone are also viable options"
对单和对群的武器建议都要携带；适当地清理仆从可降低BOSS战难度: "It is recommended to bring both single-target and crowd-control weapons; clearing minions properly lowers the difficulty of the fight"
在导弹攻击模式时略微向上飞行，利用自由落体-冲刺-向上飞行的方式躲开后续的仆从: "During the Missile phase, fly slightly upward, then use a freefall-dash-fly upward sequence to dodge trailing minions"
在第二阶段时注意不要飞太高，否则后续核弹攻击较难躲避: "Avoid flying too high during Phase 2, as it makes dodging the subsequent Nuke attacks much harder"
导弹攻击模式可以保持较低的移速来保证输出效率（仍需注意仆从的位置）: "You can maintain a lower movement speed during the Missile phase to maximize DPS (though you still need to watch minion positions)"
注意在核弹攻击时保持适当距离（自由落体/冲刺），避免被爆炸波及: "Keep a safe distance during Nuke attacks (using freefall/dashes) to avoid getting caught in the explosion blast radius"
在神圣之地夜间捕捉七彩草蛉: "Catch a Prismatic Lacewing in the Hallow at night"
击杀七彩草蛉后召唤光之女皇: "Killing the Prismatic Lacewing summons the Empress of Light"
传送到玩家周围的随机位置: "Teleports to a random location around the player"
发出叫声并向后蓄力: "Emits a sound and winds up backward"
向前冲向玩家并散射出大量追踪水晶矢: "Dashes forward at the player while releasing a massive fan of homing Prismatic Bolts"
'[信息] 攻击方式-水晶矢': "[Info] Attack Pattern - Prismatic Bolts"
向玩家发射一些有追踪能力的水晶矢: "Fires a sequence of homing Prismatic Bolts at the player"
第二阶段新增水晶矢变种攻击，发射角度随机: "Phase 2 introduces a Prismatic Bolt variant with randomized firing angles"
'[信息] 攻击方式-太阳之舞': "[Info] Attack Pattern - Sun Dance"
传送到玩家前方: "Teleports in front of the player"
保持垂直方向与玩家平齐；水平方向的距离不会超过16格: "Stays vertically level with the player; horizontal distance will not exceed 16 tiles"
发射多次顺时针旋转的光之射线: "Emits several clockwise-rotating beams of light"
光之射线需要短暂的时间成型；成型后会造成接触伤害: "The beams take a brief moment to materialize, after which they deal contact damage"
'[信息] 攻击方式-空灵长枪': "[Info] Attack Pattern - Ethereal Lance"
朝玩家的移动方向射出空灵长枪弹幕: "Fires a line of Ethereal Lances in the direction the player is moving"
弹幕发射前会有瞄准线帮助玩家判断: "Telegraph lines appear before the lances fire to help the player predict them"
第二阶段新增空灵长枪变种攻击: "Phase 2 introduces an Ethereal Lance variant attack"
每次会射出一束长枪弹幕而非一支: "Fires a sweeping wall of lances instead of a single line"
'[信息] 攻击方式-永恒虹光': "[Info] Attack Pattern - Everlasting Rainbow"
传送到玩家附近的位置: "Teleports to a position near the player"
在原地放出大量旋转散开后重新聚拢的虹光弹幕: "Releases a ring of light petals that spiral outward from her position, then spiral back in"
虹光弹幕会在附近存在较长的时间: "The rainbow trails linger in the area for a considerable amount of time"
BOSS在生命值50%以上时为第一阶段: "Phase 1 occurs while the boss is above 50% HP"
第一阶段的攻击顺序如下：: "The attack sequence for Phase 1 is as follows:"
水晶矢: "Prismatic Bolt"
冲撞: "Dash"
太阳之舞: "Sun Dance"
永恒虹光: "Everlasting Rainbow"
空灵长枪: "Ethereal Lance"
第二阶段的攻击顺序如下：: "The attack sequence for Phase 2 is as follows:"
空灵长枪变种: "Ethereal Lance Variant"
水晶矢变种: "Prismatic Bolts Variant"
'[信息] BOSS特性-日夜': "[Info] Boss Mechanics - Day and Night"
白天召唤的光之女皇会获得双倍的伤害: "The Empress of Light deals instantly fatal damage when fought during the day"
此外，太阳之舞会变成八束而非六束: "Additionally, her Sun Dance emits eight beams instead of six"
在白天召唤的光之女皇被击败后会掉落泰拉棱镜: "Defeating the Empress of Light during the day guarantees the Terraprisma drop"
夜间召唤的光之女皇会在白天脱战，反之亦然: "An Empress summoned at night will despawn when daytime hits, and vice versa"
花后/灾厄之眼后和石巨人后的护甲都是不错的选择: "Armor sets available post-Plantera, post-Calamitas Clone, or post-Golem are all great choices"
本BOSS战仅有对单输出，请选择适合的武器: "This boss fight is purely single-target, so choose your weapons accordingly"
垂直方向移动可以有效规避大部分弹幕；太阳之舞攻击需要水平移动躲避: "Moving vertically effectively dodges most projectiles; the Sun Dance attack requires horizontal movement to evade"
留意永恒虹光的释放位置: "Keep a close eye on where the Everlasting Rainbow is deployed"
在丛林洞穴捕捉松露虫: "Catch Truffle Worms in Jungle Caves"
在海洋使用松露虫钓鱼召唤猪鲨公爵: "Fish with a Truffle Worm in the Ocean to summon Duke Fishron"
向玩家预判冲撞五次: "Performs 5 predictive dashes towards the player"
吐出一串追踪的泡泡；泡泡可被击破: "Spits out a chain of homing bubbles; bubbles can be popped"
喷出三个水螺旋，稍后变成三个水龙卷并向玩家抛射龙卷鲨: "Fires 3 water tornadoes that later turn into Sharknadoes and launch Sharkrons at the player"
龙卷鲨在接触方块时会死亡: "Sharkrons die upon colliding with blocks"
在生命值低于70%时进入第二阶段: "Enters Phase 2 when health falls below 70%"
向玩家冲撞三次；有一半概率直冲，一半概率预判: "Dashes 3 times at the player; each dash has a 50% chance to be straight and a 50% chance to be predictive"
喷出一个追踪水螺旋，击中玩家或超时会变成水龙卷: "Fires a homing water tornado that turns into a Sharknado upon hitting the player or timing out"
围绕玩家转圈并发射大量追踪泡泡: "Circles around the player while firing a large amount of homing bubbles"
在生命值低于40%时进入第三阶段: "Enters Phase 3 when health falls below 40%"
隐身，传送到玩家身边并冲刺一次: "Invisibly teleports next to the player and dashes once"
隐身，传送到玩家身边并冲刺两次: "Invisibly teleports next to the player and dashes twice"
隐身，传送到玩家身边并冲刺三次: "Invisibly teleports next to the player and dashes three times"
每轮连续冲刺的第一次为预判冲刺，其余为直冲: "The first dash of each consecutive sequence is predictive, while the rest are straight"
在生命值低于20%时进入第四阶段: "Enters Phase 4 when health falls below 20%"
在隐身与直冲之间循环: "Cycles between invisibility and straight dashes"
定时喷出一个追踪水螺旋: "Periodically fires a homing water tornado"
石巨人/瘟疫使者歌莉娅后护甲均可: "Post-Golem or post-Plaguebringer Goliath armor is acceptable"
幽魂套装可以为队友提供续航；单人挑战由于坦度和伤害过低不太推荐: "Spectre armor provides sustainability for teammates; it is not recommended for solo challenges due to low defense and damage"
对单武器与高效清理泡泡的武器均有用武之地: "Both single-target weapons and weapons efficient at clearing bubbles are highly useful"
留意骗一二阶段的预判冲刺，不要直线走位: "Watch out to bait the predictive dashes in Phase 1 and 2; avoid moving in a straight line"
三四阶段注意记录冲刺节奏，骗每轮的第一次冲刺预判: "In Phase 3 and 4, keep track of the dash rhythm and bait the first predictive dash of each sequence"
秘银砧处制作唤死笛哨: "Craft the Necroplasmic Beacon at a Mythril Anvil"
随时使用均可召唤毁灭魔像: "Can be used at any time to summon Ravager"
在任意其他身体部位存活时，身体会跃向玩家: "The body will leap at the player as long as any other body part is alive"
存活的手部会向玩家出拳，类似于石巨人的攻击方式: "Surviving hands will punch the player, similar to Golem''s attack pattern"
在其他身体部位全部击溃后，身体会飞向玩家上方并下砸: "Once all other body parts are destroyed, the body will fly above the player and ground-pound"
BOSS战全程会周期性召唤四个石元柱（注意观察BOSS血条颜色）: "Four pillars are periodically summoned throughout the boss fight (pay attention to the color of the boss health bar)"
石元柱会瞄准玩家移动的方向: "The pillars will aim ahead of the player''s movement direction"
头部在被击溃前会保持在身体上方，向玩家发射火箭: "Before being destroyed, the head stays above the body and fires rockets at the player"
火箭会多次冲向玩家并最终爆炸: "Rockets will repeatedly lunge towards the player and eventually explode"
头部被击溃后会脱离身体在玩家下方飞行，继续发射火箭: "After the head is defeated, it detaches from the body, flies beneath the player, and continues firing rockets"
再次击溃头部即可将其完全摧毁: "Defeat the head again to destroy it completely"
本BOSS的难点主要来源于石元柱: "The primary difficulty of this boss comes from the pillars"
躲避石元柱需要轻微变向移动: "Evading the pillars requires subtle changes in movement direction"
可尝试在BOSS血条变红时按住AS（或只按下A），在变回绿色后按住S: "Try holding A+S (or just A) when the boss health bar turns red, and hold S once it turns back to green"
在需要冲刺飙车时，只按A键变向后S冲刺会更安全: "When you need to dash and build up speed, changing direction with just the A key before pressing S to dash is safer"
谨慎使用会被石元柱轻易阻挡的武器；对群武器（如利刃台风）在BOSS战前中期更理想: "Be cautious with weapons that are easily blocked by the pillars; crowd-control weapons (like Razorblade Typhoon) are ideal for the early-to-mid phase of the fight"
地牢中刷新拜月教教徒: "Cultists spawn in the Dungeon entry"
击败拜月教教徒即可召唤拜月教邪教徒: "Defeat the Cultists to summon the Lunatic Cultist"
'[信息] 攻击方式-火光球': "[Info] Attack Pattern - Fireballs"
传送到玩家斜上方: "Teleports diagonally above the player"
向玩家发射数个追踪火光球: "Fires several homing fireballs at the player"
'[信息] 攻击方式-冰球': "[Info] Attack Pattern - Ice Mist"
向玩家发射两个缓慢追踪的冰球: "Fires two slowly homing Ice Mists at the player"
冰球会向玩家射出一条由弹幕组成的圆弧: "The Ice Mist fires an arc of projectiles toward the player"
'[信息] 攻击方式-闪电珠': "[Info] Attack Pattern - Lightning Orb"
在头顶召唤一个闪电珠: "Summons a Lightning Orb above its head"
闪电珠会向玩家射出数道闪电: "The Lightning Orb fires several bolts of lightning at the player"
'[信息] 攻击方式-远古噩运妖': "[Info] Attack Pattern - Ancient Doom"
在玩家附近召唤数个旋转的远古噩运妖: "Summons several spinning Ancient Dooms near the player"
不久后，远古噩运妖会分裂成向各个方向发射的预言之末弹幕: "Shortly after, the Ancient Dooms split into Prophecy''s End projectiles fired in all directions"
此攻击拥有超高的伤害: "This attack deals extremely high damage"
'[信息] 攻击方式-召唤仆从': "[Info] Attack Pattern - Summon Minions"
召唤额外两个克隆体: "Summons two additional clones"
克隆体会随BOSS移动；在除召唤外的攻击方式过程中将射出追踪暗影焰: "Clones move with the boss and fire homing Shadowflames during non-summoning attack phases"
若该阶段中BOSS没有受伤，BOSS还会额外召唤一条幻影弓龙: "If the boss takes no damage during this ritual phase, it will summon a Phantasm Dragon"
'[信息] 攻击方式-远古光明妖': "[Info] Attack Pattern - Ancient Light"
仅在生命值低于50%时可以使用: "Can only be used when health falls below 50%"
多次发射扇形的远古光明妖弹幕追踪玩家: "Repeatedly fires fan-shaped bursts of homing Ancient Light projectiles at the player"
在地牢的最底端有一个最大的房间；地牢BOSS均建议在这里挑战: "There is a massive room at the very bottom of the Dungeon; it is highly recommended to fight Dungeon bosses here"
尽量不要长时间靠近天花板，防止BOSS传送到墙里: "Try not to stay close to the ceiling for too long to prevent the boss from teleporting inside walls"
携带准确的单点武器以打断召唤仪式: "Bring an accurate single-target weapon to interrupt the summoning ritual"
建议携带对群武器处理不慎召唤的幻影弓龙: "Bringing a crowd-control weapon is recommended to deal with the Phantasm Dragon if accidentally summoned"
不停在飞行（顶天花板可以更快变向）和下落之间切换并在转换时冲刺以保证移速: "Constantly switch between flying (bumping into the ceiling helps change direction faster) and falling, and dash during transitions to maintain speed"
仅在BOSS传送卡墙时略微减少飞行高度对齐时间轴（否则会吃追踪弹）: "Slightly reduce your flight altitude to realign your positioning only when the boss teleports into a wall (otherwise, you will get hit by homing projectiles)"
星辉瘟疫的擎星者会掉落泰坦之心: "Atlas in the Astral Infection drops Titan Hearts"
手持泰坦之心右键星辉瘟疫的祭坛召唤星神游龙: "Right-click the Astral Beacon with a Titan Heart in hand to summon Astrum Deus"
向玩家移动并在接近后冲撞: "Moves toward the player and rams them once close"
身体会发射激光和幻星雷；生命值小于50%时激光会预判发射: "The body fires lasers and Astral Mines; when health drops below 50%, lasers will be fired predictively"
幻星雷会略微追踪玩家并很快停止；消失前会存在较长时间: "Astral Mines home in slightly on the player before stopping; they linger for a long time before disappearing"
生命值降低到50%时分裂成两条星神游龙独立行动: "Splits into two independent Astrum Deus worms when health drops to 50%"
两条龙通常一上一下交错攻击: "The two worms usually alternate their attacks, with one striking from above and one from below"
BOSS存活时的极限重力DEBUFF会导致飞行时间减少: "The Extreme Gravity debuff applied while the boss is alive reduces flight time"
强烈建议使用拥有足够伤害的对群武器来挑战BOSS: "It is highly recommended to use crowd-control weapons with high damage output to challenge this boss"
尽量将冲刺用于闪避头部撞击，蠕虫敌人的头部会造成极高伤害: "Save your dashes primarily to dodge head impacts; the head of worm enemies deals extreme damage"
准备较大的场地用于迂回；避开幻星雷暂未消失的场地: "Prepare a large arena to maneuver around; avoid areas where Astral Mines have not yet disappeared"
尽量不要保持同一方向移动过久，以免被激光命中: "Avoid moving in the same direction for too long to prevent being sniped by lasers"
击溃拜月教邪教徒死后产生的四根天界柱可召唤: "Can be summoned by defeating the four Celestial Pillars that appear after the Lunatic Cultist dies"
在远古操纵机中合成天界符亦可召唤: "Can also be summoned by crafting a Celestial Sigil at an Ancient Manipulator"
'[信息] 攻击方式-眼睛': "[Info] Attack Pattern - Eyes"
月球领主会缓慢围绕玩家旋转；身体上的眼睛在被重创后会生成克苏鲁真眼幻象: "The Moon Lord slowly rotates around the player; after the eyes on his body are defeated, they spawn True Eyes of Cthulhu"
所有眼睛都被重创后心脏可以被攻击: "The Core can be attacked once all eyes have been defeated"
眼睛有以下攻击方式：: "The eyes have the following attack patterns:"
预判玩家移动并射出2个幻影矢: "Fires 2 Phantasmal Bolts predictively based on the player''s movement"
射出大量略微追踪的爆炸幻影眼: "Fires a large burst of slightly homing, exploding Phantasmal Eyes"
抛出一串幻影球并一起预判射向玩家（仅手部）: "Launches a chain of Phantasmal Spheres that sweep predictively toward the player (Hand eyes only)"
扫射一束致命激光（仅头部）: "Sweeps a Phantasmal Deathray (Head eye only)"
'[信息] 攻击方式-克苏鲁真眼': "[Info] Attack Pattern - True Eye of Cthulhu"
所有克苏鲁真眼会同步使用以下三种攻击模式：: "All True Eyes of Cthulhu will simultaneously use the following three attack modes:"
幻影矢攻击: "Phantasmal Bolt attack"
幻影眼攻击: "Phantasmal Eye attack"
幻影球攻击: "Phantasmal Sphere attack"
弱化版致命激光攻击: "Weakened Phantasmal Deathray attack"
根据攻击模式，BOSS血条会更换颜色: "The boss health bar changes color depending on the attack mode"
星神游龙后的星幻套装可以提供出色的攻防属性以及一些移速: "Post-Astrum Deus Astral armor provides excellent offensive/defensive stats and some movement speed"
尽量使用带有自动追踪能力的武器: "Try to use weapons with auto-homing capabilities"
注意通过来回水平变向来躲避预判弹道: "Evade predictive trajectories by weaving back and forth horizontally"
使用冲刺和快速垂直移动躲避致命激光: "Use dashes and rapid vertical movement to dodge the Phantasmal Deathray"
仔细观察BOSS血条颜色来判断克苏鲁真眼的攻击类型: "Closely observe the color of the boss health bar to determine the True Eye of Cthulhu''s attack type"
四柱碎片可以参与制作更高级的治疗药水: "Celestial Pillars'' fragments can be used to craft higher-tier healing potions"
'[信息] 痴愚金龙': "[Info] Bumblebirb / Dragonfolly"
'[信息] 亵渎守卫': "[Info] Profaned Guardians"
'[信息] 亵渎天神': "[Info] Providence, the Profaned Goddess"
'[信息] 风暴编织者': "[Info] Storm Weaver"
'[信息] 无尽虚空': "[Info] Ceaseless Void"
'[信息] 神之使徒西格纳斯': "[Info] Signus, Envoy of the Devourer"
'[信息] 噬魂幽花': "[Info] Polterghast"
'[信息] 硫海遗爵': "[Info] Old Duke"
'[信息] 神明吞噬者': "[Info] The Devourer of Gods"
'[信息] 丛林龙，犽戎': "[Info] Yharon, Dragon of Rebirth"
'[信息] 星流巨械': "[Info] Exo Mechs"
'[信息] 至尊灾厄': "[Info] Supreme Calamitas"
远古操纵机合成奇异信息素: "Craft Exotic Pheromones at an Ancient Manipulator"
在丛林使用召唤痴愚金龙: "Use in the Jungle to summon the Dragonfolly"
召唤环形火墙；火墙外的玩家会被龙焰点燃: "Summons a ring of fire; players outside the ring will be inflicted with Dragonfire"
向玩家冲刺，冲刺时按照加速度预判: "Dashes at the player, tracking with predictive acceleration"
冲刺有10%概率被替换成在玩家的移动方向发射大量闪耀红羽: "Dashes have a 10% chance to be replaced by firing a barrage of Red Lightning Feathers ahead of the player''s movement"
闪耀红羽会缓慢追踪玩家；追踪结束后速度获得大幅增加: "Red Lightning Feathers home in slowly on the player, gaining a massive speed boost once tracking ends"
生命低于75%时进入第二阶段: "Enters Phase 2 when health falls below 75%"
冲刺速度略微增加，开始按照速度而非加速度预判: "Dash speed increases slightly, tracking with velocity-based prediction instead of acceleration"
冲刺间隔减少: "The delay between dashes decreases"
冲刺有20%概率被替换成闪耀红羽攻击: "Dashes have a 20% chance to be replaced by the Red Lightning Feather attack"
闪耀红羽攻击的前后摇缩短: "The wind-up and recovery time of the Red Lightning Feather attack are shortened"
生命低于40%时进入第三阶段: "Enters Phase 3 when health falls below 40%"
冲刺速度进一步增加: "Dash speed increases further"
冲刺间隔进一步减少: "The delay between dashes decreases further"
冲刺有30%概率被替换成闪耀红羽攻击: "Dashes have a 30% chance to be replaced by the Red Lightning Feather attack"
闪耀红羽攻击的前后摇进一步缩短: "The wind-up and recovery time of the Red Lightning Feather attack are shortened further"
月球领主后夜明锭制作的各职业武器，护甲和饰品能够极大地帮助挑战BOSS: "Post-Moon Lord Luminite class weapons, armor, and accessories will greatly aid you in challenging this boss"
多人挑战时，星云套装的集体BUFF可以提供续航和输出的全方面增强: "In multiplayer, Nebula armor''s team buffs provide comprehensive boosts to both sustainability and DPS"
注意观察火墙范围，避免受到不必要的龙焰灼烧: "Keep an eye on the boundaries of the fire ring to avoid taking unnecessary Dragonfire damage"
注意及时变向和冲刺晃掉BOSS的冲刺预判: "Be sure to change directions timely and use dashes to shake off the boss''s predictive tracking"
第一阶段使用快速水平变向骗预判极为有效: "Using rapid horizontal direction switches in Phase 1 is highly effective at baiting the tracking"
保持垂直方向的移动可以帮助减少弹幕的威胁: "Maintaining vertical movement helps mitigate the threat of projectiles"
在远古操纵机中合成亵渎碎片: "Craft the Profaned Shard at an Ancient Manipulator"
在神圣之地使用亵渎碎片召唤亵渎守卫: "Use the Profaned Shard in the Hallow to summon the Profaned Guardians"
'[信息] 攻击方式-圣晶守卫': "[Info] Attack Pattern - Crystal Guardian"
保持在玩家的斜上方，向玩家倾斜大量神圣新星弹幕: "Stays diagonally above the player, raining down a massive barrage of Holy Nova projectiles"
该守卫存活时会保护神石守卫，使其免受伤害: "While this guardian is alive, it protects the Rock Guardian, making it immune to damage"
在生命值减少至70%和40%时各进行一次激光攻击: "Fires a laser attack once at 70% HP and again at 40% HP"
此时，上下两道激光将向玩家聚拢，最终于留下狭窄空隙时结束: "During this, two lasers from above and below converge on the player, ending once only a narrow gap remains"
'[信息] 攻击方式-神石守卫': "[Info] Attack Pattern - Rock Guardian"
保持在玩家的水平方向: "Stays horizontally level with the player"
该守卫存活时会保护统御守卫，使其免受伤害: "While this guardian is alive, it protects the Main Guardian, making it immune to damage"
存活时召唤大量脆弱的亵渎岩；亵渎岩存在一定时间后会径直射向玩家: "While alive, summons many fragile Profaned Rocks; after a short time, they fly straight toward the player"
在圣晶守卫被击溃后进入第二阶段: "Enters Phase 2 after the Crystal Guardian is defeated"
偶尔射出神圣之矛；第二阶段时射速翻倍且低概率射出闪耀之弹: "Occasionally fires Holy Spears; in Phase 2, its fire rate doubles and it has a low chance to fire Flare projectiles"
闪耀之弹会滞留并召唤出大量神圣之火弹幕: "Flares linger in place and summon a massive barrage of Holy Flames"
第二阶段可以进行冲撞攻击；冲撞攻击利用玩家的加速度进行预判: "Can perform ramming attacks in Phase 2; these dashes predictively target the player based on their velocity"
'[信息] 攻击方式-统御守卫': "[Info] Attack Pattern - Main Guardian"
在玩家的水平方向游荡: "Hovers horizontally level with the player"
偶尔射出神圣之火弹幕: "Occasionally fires a barrage of Holy Flames"
在神石守卫被击溃后进入第二阶段: "Enters Phase 2 after the Rock Guardian is defeated"
第二阶段改为发射会追踪并爆裂成神圣之火的圣之爆焱；射速得到极大增强: "In Phase 2, switches to firing Holy Blasts that home in and explode into Holy Flames; fire rate is massively increased"
月球领主后的护甲非常有效: "Post-Moon Lord armor is highly effective"
痴愚金龙后可制作的进升证章可帮助躲避圣晶守卫的激光: "The Badge of Bravery, craftable after the Bumblebirb/Dragonfolly, helps evade the Crystal Guardian''s lasers"
保持后撤可显著降低圣晶守卫的晶石弹幕墙难度: "Constantly backing away significantly lowers the difficulty of dealing with the Crystal Guardian''s shard walls"
记得假动作骗歪神石和统御守卫的冲刺: "Remember to use feints to bait and misdirect the dashes of the Rock and Main Guardians"
保持高速移动和冲刺来规避统御守卫的爆焱弹幕: "Keep moving at high speeds and dashing to evade the Main Guardian''s Holy Blast barrages"
在飞行的顶端和底端（接触地面刷新飞行时间时）使用冲刺可以保持全程高速移动: "Dash at the apex and bottom of your flight (when touching the ground to refresh flight time) to maintain high momentum throughout"
'[信息] ': "[Info] "
亵渎守卫宝藏袋会掉落三个亵渎晶核: "The Profaned Guardians Treasure Bag drops three Profaned Cores"
白天在神圣之地使用亵渎晶核召唤亵渎天神: "Use a Profaned Core in the Hallow during the daytime to summon Providence, the Profaned Goddess"
'[信息] 攻击方式-爆焱阶段、烁光阶段': "[Info] Attack Pattern - Holy Blast & Flare Phases"
在玩家斜上方摇摆飞行: "Weaves back and forth diagonally above the player"
在爆焱阶段射出圣之爆焱，在烁光阶段射出闪耀之弹: "Fires Holy Blasts during the Holy Blast Phase, and Flares during the Flare Phase"
在爆焱阶段射出圣之爆焱: "Fires Holy Blasts during the Holy Blast Phase"
'[信息] 攻击方式-茧形阶段、圣之耀光阶段': "[Info] Attack Pattern - Cocoon & Holy Ray Phases"
开始时，引爆爆焱阶段、烁光阶段的弹幕: "At the start, detonates any remaining projectiles from the Holy Blast and Flare Phases"
垂直移动到最高方块上方的一定距离后停止: "Moves vertically to a set distance above the highest block and halts"
在神圣新星时获得超高减伤: "Gains massive damage reduction during Holy Novas"
在茧形阶段射出三连发的神圣新星弹幕墙: "Fires a 3-burst wall of Holy Nova projectiles during the Cocoon Phase"
在圣之耀光阶段发射上下两束缓慢聚合的激光，在斜下方仅剩少量间隙时结束: "During the Holy Ray Phase, fires two slowly converging lasers from above and below, ending when only a small gap remains diagonally below"
两种阶段时都会显示离BOSS的距离条: "A distance bar from the boss is displayed during both phases"
一旦攻击开始，则距离过远的玩家都会受到长时间灼伤；灼伤时长随距离增加而增加: "Once the attack begins, players who are too far away suffer a prolonged burning debuff; the duration increases with distance"
'[信息] 召唤守卫': "[Info] Summoning Guardians"
生命值降低到33%以下时，召唤亵渎守卫: "Summons Profaned Guardians when HP drops below 33%"
召唤在BOSS战中只会进行一次: "This summon only occurs once per boss fight"
亵渎守卫将一部分力量用于缓慢治疗亵渎天神: "The Profaned Guardians channel a portion of their power to slowly heal Providence"
亵渎天神此时会按照弱化版的爆焱阶段攻击: "Providence will attack using a weakened version of her Holy Blast Phase during this time"
多次挑战亵渎守卫以练习应对弹幕墙的走位并让击败守卫游刃有余: "Fight the Profaned Guardians multiple times to practice positioning against their bullet hell walls, making the fight effortless"
在弹幕阶段时保持高速移动、在阵地战阶段时靠近地面并小心走位: "Maintain high speeds during projectile phases, and stay close to the ground with precise positioning during stationary phases"
茧形阶段时可通过在地面移动、观察并向侧面弹道缝隙移动来躲避: "During the Cocoon Phase, evade by moving on the ground, observing the trajectories, and slipping into horizontal gaps"
注意亵渎天神的圣之耀光的聚合位置偏下，而亵渎守卫的激光聚合位置为水平方向: "Note that Providence''s Holy Ray converges further down, whereas the Guardians'' lasers converge horizontally"
换言之，可以控制飞行速度并始终略微高于下方射线以躲避圣之耀光: "In other words, you can control your flight speed to stay just above the bottom beam to evade the Holy Ray"
在远古操纵机中合成宇宙符文: "Craft the Cosmic Rune at an Ancient Manipulator"
在太空层（Y>200）使用召唤风暴编织者: "Use it in the Space layer (Y > 200) to summon the Storm Weaver"
向玩家移动并在接近后冲刺: "Moves toward the player and dashes upon getting close"
冲刺结束后从头到尾释放一轮激光: "Releases a sweeping wave of lasers from head to tail after completing a dash"
头部和身体受到极高护甲的保护: "Its head and body are protected by extremely high defense"
移动和冲刺速度极大增加: "Movement and dash speeds are drastically increased"
护甲破碎，全身均可正常受到伤害: "Armor shatters, allowing all body segments to take normal damage"
冲刺三次后旋转并发射四次寒霜波弹幕墙: "Dashes three times, then spins to release four walls of Frost Wave projectiles"
亵渎天神后可以制作龙蒿&神圣晶石系列武器装备: "Post-Providence, you can craft Tarragon and Profaned Crystal gear/weapons"
亵渎天神后的神圣晶石亦可升级治疗药水: "Profaned Crystals obtained after Providence can also be used to upgrade healing potions"
所有职业均可考虑携带方舟，被寒霜波命中后格挡一次头部撞击: "All classes should consider bringing an Ark weapon to parry a head-butt if struck by a Frost Wave"
第二阶段的冲刺必须用以躲避头部冲撞；尽量不被寒霜波命中减速: "Phase 2 dashes must be reserved to dodge head-butts; do your best not to get slowed down by Frost Waves"
第一阶段使用对单武器单点尾节，第二阶段使用对群武器最大化输出: "Use single-target weapons on the tail segment in Phase 1, and switch to AOE weapons for maximum DPS in Phase 2"
在地牢使用召唤无尽虚空: "Use it in the Dungeon to summon the Ceaseless Void"
'[信息] 攻击方式-暗能量阶段': "[Info] Attack Pattern - Dark Energy Phase"
在此阶段时，BOSS本体无法受到伤害: "The boss itself is completely immune to damage during this phase"
召唤出多个暗能量组成的环形旋臂: "Summons multiple orbiting rings of Dark Energy"
暗能量击中玩家时会造成极短的扭曲减益: "Dark Energy inflicts a brief Distorted debuff upon hitting the player"
旋臂会围绕无尽虚空旋转，并且半径会随玩家位置调整: "The orbiting rings rotate around the Ceaseless Void, adjusting their radius based on the player''s position"
在暗能量的四分之三被击败后，其余的暗能量也会消散；BOSS进入弹幕阶段: "Once three-quarters of the Dark Energies are defeated, the rest dissipate, and the boss enters the projectile phase"
'[信息] 攻击方式-弹幕阶段': "[Info] Attack Pattern - Projectile Phase"
本阶段BOSS在原地停止，不再移动但可以受到伤害: "The boss stops moving and remains stationary in this phase, allowing it to take damage"
向玩家发射暗物质弹幕墙: "Fires walls of Dark Matter projectiles at the player"
随着生命值的降低，无尽虚空对玩家的引力逐渐增强；该效果在暗能量阶段依然有效: "As its HP drops, the Ceaseless Void''s gravitational pull on the player grows stronger; this effect persists during Dark Energy phases"
生命值降低到80%/60%/40%时，再次进入暗能量阶段: "Re-enters the Dark Energy Phase when HP drops to 80%, 60%, and 40%"
暗能量旋臂调整旋转半径时有三种类型：慢速，中速和快速: "The Dark Energy rings adjust their orbital radius at three different speeds: slow, medium, and fast"
可考虑在大量旋臂的半径都与自身接近时钻入内圈减轻走位压力: "Consider weaving into the inner ring when multiple orbits close in on you to reduce positioning pressure"
无尽虚空本体会造成难以想象的高接触伤害，钻内圈时稍加小心: "The Ceaseless Void itself deals unimaginably high contact damage, so be careful when dipping into the inner circle"
无尽虚空的引力与距离的平方成正比；这使得BOSS战的中后期走位空间进一步受限: "The Ceaseless Void''s pull is inversely proportional to the square of the distance; this heavily restricts movement in the mid-to-late boss fight"
本次BOSS战需要准备对单和对群武器，用以对抗弹幕阶段和暗能量阶段: "Prepare both single-target and AOE weapons for this fight to counter the Projectile and Dark Energy phases respectively"
在地狱使用召唤西格纳斯: "Use it in the Underworld to summon Signus, Envoy of the Devourer"
'[信息] 攻击方式-灯笼模式': "[Info] Attack Pattern - Lantern Mode"
在此攻击模式下，BOSS血条为绿色: "The boss''s health bar turns green during this attack mode"
BOSS会传送到玩家附近的位置并释放缓慢追踪的宇宙灯笼: "The boss teleports near the player and releases slow, homing Cosmic Lanterns"
生命值低于30%时不再使用此攻击: "No longer uses this attack when HP falls below 30%"
释放三次灯笼后等待片刻并随机选择攻击方式（可重复）: "After releasing lanterns three times, pauses briefly and randomly selects an attack pattern (can repeat)"
'[信息] 攻击方式-冲刺模式': "[Info] Attack Pattern - Dash Mode"
在此攻击模式下，BOSS血条为红: "The boss''s health bar turns red during this attack mode"
BOSS会向玩家冲刺；冲刺过程中可以缓慢变向: "The boss dashes toward the player; it can slowly change its direction mid-dash"
冲刺的前半段会向前发射出一串西格纳斯鬼镰: "Fires a stream of Signus Scythes forward during the first half of its dash"
鬼镰在飞行一段时间后会折返再次直线飞向玩家: "After flying for a while, the scythes loop back and fly straight toward the player again"
冲刺完成后减速片刻并随机选择攻击方式（可重复）: "Slows down briefly after completing a dash and randomly selects an attack pattern (can repeat)"
'[信息] 攻击方式-弹幕模式': "[Info] Attack Pattern - Projectile Mode"
在此攻击模式下，BOSS血条为紫: "The boss''s health bar turns purple during this attack mode"
BOSS会在玩家头顶飞行并射出西格纳斯鬼镰组成的弹幕墙: "The boss flies above the player''s head, raining down walls of Signus Scythe projectiles"
发射三次后等待片刻并随机选择攻击方式（可重复）: "After firing three times, pauses briefly and randomly selects an attack pattern (can repeat)"
地狱的空间较为狭窄，建议使用雷管等工具平整地面的小土丘: "The Underworld is quite cramped; it is recommended to use Dynamites or other tools to flatten small mounds on the ground"
在岩浆池岸边使用玻璃平台可以替换掉岩浆: "Placing Glass Platforms along the edges of lava pools can safely overwrite and replace the lava"
建议使用雪人炮射出日食时购买的四级火箭炸开天花板（保险起见可炸到基岩层）: "It is recommended to use a Snowman Cannon with Rocket IVs bought during a Solar Eclipse to blow open the ceiling (can go up to the ash ceiling for safety)"
本次BOSS战中，敏捷药水与食物尤为重要: "Swiftness Potions and food buffs are exceptionally crucial for this boss fight"
在两者加成下，翅膀和极乐之庇护足以躲避BOSS最终阶段下大量鬼镰的疯狂追杀: "With both buffs active, your wings and the Asgardian Aegis/Elysian Aegis are enough to outrun the relentless onslaught of scythes in the final phase"
在鬼镰墙折返时冲撞可以有效地在进行位移的同时躲避鬼镰: "Dashing right as the wall of scythes loops back allows you to reposition while successfully evading them"
以平缓的弧形路径飞行亦可帮助躲避折返鬼镰: "Flying in a wide, gentle arc can also help you dodge the returning scythes"
在远古操纵机中合成死灵魂炬: "Craft the Necroplasmic Beacon at an Ancient Manipulator"
在地牢中使用即可召唤噬魂幽花: "Use it in the Dungeon to summon Polterghast"
向玩家发射三次弹幕墙: "Fires three walls of projectiles at the player"
向上飞行，然后进行一次直冲: "Flies upward, then executes a straight dash"
在生命值低于90%时进入第二阶段: "Enters Phase 2 when HP drops below 90%"
进入第二阶段时，防御有所减少: "Its defense decreases upon entering Phase 2"
向玩家发射两次弹幕墙: "Fires two walls of projectiles at the player"
向上飞行，然后进行两次直冲: "Flies upward, then executes two straight dashes"
在生命值低于60%时召唤一只克隆体并进入第三阶段: "Summons a clone and enters Phase 3 when HP drops below 60%"
进入第三阶段时防御再次减少: "Its defense decreases even further upon entering Phase 3"
第三阶段开始时，本体和克隆体将跟随玩家五秒后开始攻击：: "At the start of Phase 3, the main body and the clone stalk the player for five seconds before attacking:"
本体和克隆体一起发射一颗蓝色能量珠: "The main body and the clone simultaneously fire a blue energy orb"
从本体，克隆体和能量珠位置各射出弹幕墙: "Walls of projectiles erupt from the positions of the main body, the clone, and the energy orb"
本体和克隆体垂直方向交换位置后进行预判冲撞: "The main body and the clone swap vertical positions before executing predictive dashes"
克隆体被击败时进入第四阶段: "Enters Phase 4 once the clone is defeated"
第四阶段开始时，将跟随玩家两秒后开始攻击：: "At the start of Phase 4, it stalks the player for two seconds before attacking:"
发射一个弹幕墙，射出的同时向上飞行: "Fires a wall of projectiles while ascending vertically"
短暂延迟后进行预判冲撞；本阶段预判冲撞将基于加速度: "Executes a predictive dash after a brief delay; predictive dashes in this phase account for your acceleration"
可酌情考虑使用三仆从BOSS掉落物合成的对单类武器: "Consider using single-target weapons crafted from the drops of the Rune of Kos bosses where appropriate"
第一、二阶段难度较低，不再赘述: "Phases 1 and 2 are relatively easy and require no further explanation"
第三阶段开始时把BOSS引至墙角后向对角方向快速移动: "At the start of Phase 3, lure the boss into a corner, then break away rapidly in the diagonal direction"
之后，第三阶段尽可能利用对角线的距离拉开弹幕墙的间隔，方便走位: "Afterward, use the diagonal distance in Phase 3 as much as possible to widen the gaps between projectile walls for easier dodging"
第四阶段时，需与BOSS保持中等的距离，以便连续躲避弹幕墙和冲撞: "In Phase 4, maintain a medium distance from the boss to consistently dodge both the projectile walls and the dashes"
第三、四阶段时冲刺均用来躲避BOSS的预判冲撞: "In Phases 3 and 4, dashes should be reserved solely to evade the boss''s predictive ramming attacks"
在硫磺海沙滩上捕获血蠕虫: "Catch a Bloodworm on the Sulphur Sea beach"
在硫磺海使用血蠕虫钓鱼召唤硫海遗爵: "Fish with a Bloodworm in the Sulphur Sea to summon the Old Duke"
冲刺三次: "Dash three times"
飞向玩家，喷出追踪的遗爵鲨牙刺球: "Fly towards the player, spitting homing Old Duke Shark Tooth Spikes"
飞向玩家并射出追踪的硫海龙鲨: "Fly towards the player and shoot homing Sulphurous Sharkrons"
冲刺有60%的概率根据加速度预判，40%的概率根据速度预判: "Dashes have a 60% chance to predict based on acceleration, and a 40% chance to predict based on velocity"
生命低于80%时进入第二阶段: "Enter phase 2 when health falls below 80%"
冲刺两次: "Dash twice"
根据玩家的速度预判并召唤会吸入玩家的遗爵硫海漩涡: "Predict based on the player's velocity and summon an Old Duke's Sulphurous Vortex that sucks the player in"
飞向玩家并随机射出硫海龙鲨或遗爵鲨牙刺球: "Fly towards the player and randomly shoot either Sulphurous Sharkrons or Old Duke Shark Tooth Spikes"
冲刺有40%的概率根据加速度预判，60%的概率根据速度预判: "Dashes have a 40% chance to predict based on acceleration, and a 60% chance to predict based on velocity"
生命低于50%时进入第三阶段: "Enter phase 3 when health falls below 50%"
冲刺有25%的概率根据加速度预判，50%的概率根据速度预判，25%的概率直冲: "Dashes have a 25% chance to predict based on acceleration, a 50% chance to predict based on velocity, and a 25% chance to charge directly"
噬魂幽花后的血炎套装或龙蒿套装均可考虑使用: "Bloodflare armor or Tarragon armor available after Polterghast can both be considered for use"
垂直方向的移动可以帮助躲避追踪弹幕: "Vertical movement can help dodge homing projectiles"
利用冲刺、变向躲避BOSS的冲撞: "Utilize dashes and direction changes to dodge the BOSS's rams"
变向躲避且记住漩涡位置；靠近漩涡被吸中后无法逃脱: "Change direction to dodge and remember the vortex positions; you cannot escape once sucked in near a vortex"
在远古操纵机中合成宇宙之虫: "Craft the Cosmic Worm at an Ancient Manipulator"
使用宇宙之虫召唤神明吞噬者: "Use the Cosmic Worm to summon the Devourer of Gods"
向玩家冲刺五次: "Dash towards the player five times"
在玩家斜上方转圈并开始发射数轮弹幕: "Circle diagonally above the player and begin firing several waves of projectiles"
发射弹幕时，若玩家离开地面则开始冲撞玩家: "While firing projectiles, it will begin ramming the player if they leave the ground"
生命值低于60%时进入第二阶段: "Enter phase 2 when health falls below 60%"
通过传送门逃跑后召唤弱化版的三个仆从: "Escape through a portal and summon weakened versions of the three sentinels"
顺序为：风暴编织者，无尽虚空，神之使徒西格纳斯: "The order is: Storm Weaver, Ceaseless Void, and Signus, Envoy of the Devourer"
仆从全部被击败后进入第三阶段: "Enter phase 3 after all sentinels are defeated"
攻击方式类似于第一阶段: "The attack pattern is similar to phase 1"
冲刺速度显著提升，且弹幕难度有所增强: "Dash speed is significantly increased, and the projectile difficulty is enhanced"
发射弹幕时会通过传送门短暂离开战场: "Briefly leave the battlefield through a portal while firing projectiles"
通过后撤，下落和冲刺躲避BOSS的冲撞攻击: "Dodge the BOSS's ramming attacks by retreating, dropping down, and dashing"
在弹幕阶段（BOSS血条变色时）尽快降落到地面以免被追杀: "During the projectile phase (when the BOSS's health bar changes color), land on the ground as soon as possible to avoid being hunted down"
弹幕阶段时注意看清指示线帮助躲避弹幕: "During the projectile phase, pay attention to the indicator lines to help dodge projectiles"
可考虑多挑战BOSS的仆从为第二阶段做准备: "Consider practicing against the BOSS's sentinels more to prepare for phase 2"
在远古操纵机中合成圣佑烬昭龙蛋: "Craft the Blessed Phoenix Egg at an Ancient Manipulator"
在丛林使用召唤丛林龙，犽戎: "Use it in the Jungle to summon Jungle Dragon, Yharon"
进行三次直线冲刺（两慢一快）: "Perform three linear dashes (two slow, one fast)"
在短暂蓄力后传送到玩家上方并发射四轮旋转火球: "After a brief charge, teleport above the player and fire four waves of rotating fireballs"
四轮火球的朝向和旋转方向一致: "The orientation and rotation direction of the four fireball waves are identical"
在短暂停歇后进行两次缓慢冲刺: "After a brief pause, perform two slow dashes"
原地绕圈飞行并向外抛射出大量追踪火球: "Fly in circles in place and launch a large amount of homing fireballs outward"
射出火焰龙卷，在触碰到玩家或超时后原地变成巨大的龙卷风: "Shoot a flame tornado that turns into a massive tornado on the spot upon touching the player or timing out"
生命值低于80%时进入第二阶段: "Enter phase 2 when health falls below 80%"
进行三次直线冲刺（一慢两快）: "Perform three linear dashes (one slow, two fast)"
水平飞行并射出追踪火球: "Fly horizontally and shoot homing fireballs"
进行两次直线冲刺（一快一慢）: "Perform two linear dashes (one fast, one slow)"
立刻传送到玩家前方并在原地发射六轮旋转火球: "Immediately teleport in front of the player and fire six waves of rotating fireballs on the spot"
六轮火球的朝向一致，旋转方向互相交错: "The orientation of the six fireball waves is identical, but their rotation directions alternate"
生命值低于55%时进入第三阶段: "Enter phase 3 when health falls below 55%"
进行两次快速直线冲刺: "Perform two fast linear dashes"
进行随机一到两次缓慢直线冲刺: "Perform one to two random slow linear dashes"
原地发射四轮旋转火球: "Fire four waves of rotating fireballs on the spot"
四轮火球呈十字形，旋转方向互相交错: "The four fireball waves form a cross shape, and their rotation directions alternate"
生命值低于35%时进入第四阶段: "Enter phase 4 when health falls below 35%"
进行三次随机快慢直线冲刺: "Perform three random fast or slow linear dashes"
原地发射五轮旋转火球；火球的密度略微减少: "Fire five waves of rotating fireballs on the spot; the density of the fireballs is slightly reduced"
五轮火球朝向依次旋转，旋转方向一致: "The orientations of the five fireball waves rotate sequentially, while their rotation direction remains identical"
生命值低于16%时进入第五阶段: "Enter phase 5 when health falls below 16%"
传送到玩家的斜前方进行快速冲刺: "Teleport diagonally in front of the player to perform a fast dash"
进行两次随机快慢直线冲刺: "Perform two random fast or slow linear dashes"
传送到玩家正前方，原地发射六轮旋转火球: "Teleport directly in front of the player and fire six waves of rotating fireballs on the spot"
火球的密度相较上一阶段再次减少: "The density of the fireballs is reduced once again compared to the previous phase"
六轮火球朝向依次旋转，旋转方向互相交错: "The orientations of the six fireball waves rotate sequentially, and their rotation directions alternate"
注意制作神明吞噬者后的大量武器，饰品和护甲以及更高级的治疗药水: "Be sure to craft the numerous weapons, accessories, armor, and higher-tier healing potions available after the Devourer of Gods"
BOSS战的主要难度来源于旋转的火球圈: "The main difficulty of the BOSS fight comes from the rotating fireball rings"
在火球圈的垂直方向走位没有意义；需沿着火球圈的方向微调位置: "Moving vertically relative to the fireball ring is pointless; you need to micro-adjust your position along the direction of the ring"
建议同时留意两轮火球以准备逃生路径: "It is recommended to watch two waves of fireballs at the same time to plan an escape route"
小心不要碰到停留在原地的龙卷或离开边界获得龙焰DEBUFF: "Be careful not to touch the stationary tornadoes or leave the arena boundaries to avoid getting the Dragonfire debuff"
龙焰DEBUFF会禁止自然生命再生: "The Dragonfire debuff prevents natural health regeneration"
可利用简单的阶段热身和熟悉旋转火球的性质: "You can use the simpler phases to warm up and familiarize yourself with the properties of the rotating fireballs"
方舟类武器也可提供额外的容错: "The Ark-line weapons can also provide extra room for error"
仔细注意BOSS转换阶段时的吼叫: "Pay close attention to the BOSS's roars during phase transitions"
第一阶段在BOSS传送发射火球前上升，随后通过适当下落躲避火球: "In phase 1, fly upwards before the BOSS teleports to fire fireballs, then drop down appropriately to dodge them"
之后阶段在BOSS发射火球前保持后退: "In later phases, keep moving backward before the BOSS fires fireballs"
最后阶段建议与BOSS保持中等的距离以避免同时躲避火球和冲刺；多进行横向而非前后移动: "In the final phase, it is recommended to maintain a medium distance from the BOSS to avoid dodging fireballs and dashes simultaneously; move laterally more often instead of back and forth"
在星宇砧制作金源量子冷却电池: "Craft Auric Quantum Cooling Cell at Cosmic Anvil"
随时使用即可召唤星流巨械: "Use at any time to summon the Exo Mechs"
'[信息] 作战顺序': "[Info] Battle Progress"
随机选中一个星流巨械与玩家战斗，直到血量降至70%: "A random Exo Mech is chosen to fight the player until its health drops to 70%"
最先被选中的星流巨械修整，另外两个与玩家战斗，直到其中一个血量降至70%: "The first chosen Exo Mech retreats, and the other two fight the player until one of them drops to 70% health"
所有星流巨械同时出现。在此阶段，所有星流巨械的攻击手段减少: "All Exo Mechs appear simultaneously. During this phase, all Exo Mechs have reduced attack methods"
某个星流巨械血量降至40%后进入狂暴状态，与玩家单独决斗: "Once any Exo Mech drops to 40% health, it enters a berserk state and duels the player alone"
剩下的两个星流巨械一起与玩家战斗，直到其中一个血量降至40%: "The remaining two Exo Mechs fight the player together until one of them drops to 40% health"
血量最低的星流巨械进入狂暴状态并与玩家决斗: "The Exo Mech with the lowest health enters a berserk state and duels the player"
最后的星流巨械进入狂暴状态并与玩家进行决斗: "The final Exo Mech enters a berserk state and duels the player"
'[信息] 阿尔忒弥斯与阿波罗': "[Info] Artemis and Apollo"
两者将在水平方向与玩家对齐（阿瑞斯存活时位置偏下）: "Both will align horizontally with the player (positioned lower while Ares is alive)"
进行部分攻击后左后位置互换: "They swap their left and right positions after performing certain attacks"
攻击模式一：: "Attack Pattern 1:"
阿尔忒弥斯向玩家发射激光，预判能力根据难度有所不同: "Artemis fires lasers at the player, with predictive capability varying by difficulty"
阿波罗释放追踪等离子光球；狂暴时改为直冲: "Apollo releases homing plasma orbs; charges directly when berserk"
攻击模式二（全部星流巨械同时出现时禁用）：: "Attack Pattern 2 (Disabled when all Exo Mechs are present):"
阿尔忒弥斯向玩家发射三次激光墙后进行预判冲撞: "Artemis fires three laser walls at the player before performing a predictive charge"
预判冲撞精确度根据难度有所不同: "Predictive charge accuracy varies by difficulty"
阿波罗发射追踪等离子火箭，追踪结束时速度激增: "Apollo fires homing plasma rockets that surge in speed when homing ends"
攻击模式三（仅70%血量以下）：: "Attack Pattern 3 (Only below 70% health):"
阿尔忒弥斯向玩家发射大量不精准的激光: "Artemis fires a large amount of inaccurate lasers at the player"
阿波罗发射追踪等离子光球；狂暴时会先进行一次预判冲刺: "Apollo fires homing plasma orbs; performs a predictive dash first when berserk"
攻击模式四（仅狂暴时）：: "Attack Pattern 4 (Only when berserk):"
阿尔忒弥斯垂直转圈并发射伤害极高的激光束: "Artemis loops vertically while firing an extremely high-damage laser beam"
阿波罗发射追踪等离子火箭: "Apollo fires homing plasma rockets"
'[信息] 塔纳托斯': "[Info] Thanatos"
体节默认处于关闭状态，期间有极高的坦度: "Segments are closed by default, granting extremely high damage reduction"
攻击模式-激光：: "Attack Pattern - Lasers:"
从头到尾发射一轮激光，发射激光的体节会打开一段时间: "Fires a round of lasers from head to tail; segments firing lasers will open for a short time"
激光数量，密度以及预判程度根据难度有所不同: "Laser count, density, and prediction accuracy vary by difficulty"
攻击模式-冲撞（全部星流巨械同时出现时禁用）：: "Attack Pattern - Charge (Disabled when all Exo Mechs are present):"
向玩家移动，靠近后猛然冲撞: "Moves towards the player and suddenly charges when close"
冲撞后会逐渐减速: "Gradually slows down after charging"
攻击模式-伽马瓦解射线（仅狂暴时）：: "Attack Pattern - Gamma Disintegration Beam (Only when berserk):"
向玩家缓慢移动，头部向前方射出伤害超高的伽马瓦解射线: "Slowly moves towards the player, firing an extremely high-damage Gamma Disintegration Beam from its head"
短暂延迟后射线成型并开始造成伤害: "The beam forms and begins dealing damage after a short delay"
此攻击期间头部的转向能力稍弱: "Its head turning capability is slightly weaker during this attack"
'[信息] 阿瑞斯': "[Info] Ares"
在水平方向偏上的位置与玩家对齐: "Aligns horizontally above the player"
手臂-镭射加农炮：: "Arm - Exo Laser Cannon:"
持续射出红色星流脉冲激光: "Continuously fires red Exo pulse lasers"
射速随难度提升而提升: "Fire rate increases with difficulty"
手臂-特斯拉加农炮：: "Arm - Tesla Cannon:"
装填后射出特斯拉星流闪电: "Fires Tesla Exo lightning after charging"
特斯拉星流闪电会向附近玩家发射电弧: "Tesla Exo lightning fires electrical arcs at nearby players"
随难度提升，装填速度变快且装填数量增加: "Charge speed increases and charge capacity increases with difficulty"
手臂-高斯核弹发射井：: "Arm - Gauss Nuke Silo:"
全部星流巨械同时出现时和终灭激光攻击时禁用: "Disabled when all Exo Mechs are present and during the Exo Obliterator beam attack"
长时间装填后射出一枚追踪的高斯核弹；射速随难度提升而提升: "Fires a homing Gauss Nuke after a long charge; projectile speed increases with difficulty"
手臂-离子加农炮：: "Arm - Plasma Cannon:"
装填后射出等离子光球: "Fires plasma orbs after charging"
身体-终灭激光（仅狂暴时）：: "Body - Exo Obliterator (Only when berserk):"
手臂的攻击被大幅削弱，此时会多次射出两道高伤终灭激光: "Arm attacks are heavily weakened, and it fires two high-damage Exo Obliterator beams multiple times"
激光从上下方向缓慢聚拢，最终只会留下狭窄的缝隙: "The beams slowly close in from above and below, leaving only a narrow gap"
通过迅捷药水与食物保证移速: "Ensure movement speed with Swiftness Potions and food items"
确保使用圣金源锭进一步提升武器，饰品和装备: "Make sure to use Auric Bars to further upgrade weapons, accessories, and gear"
本战斗的车轮战时长较长，推荐酌情携带续航饰品: "This gauntlet match lasts a long time; carrying health/mana regeneration accessories is recommended"
多人挑战时建议考虑团队装备: "Team-oriented gear is recommended for multiplayer challenges"
进升证章在三种狂暴终结技中均能发挥特殊作用: "The Badge of Bravery plays a special role in all three berserk desperation moves"
阿波罗的火箭会在结束追踪时速度猛然加快并最终爆炸，注意随时变向: "Apollo's rockets suddenly accelerate and explode when homing ends; be ready to change directions at any time"
躲避塔纳托斯的终结技时需要和它保持较近的距离并快速围绕头部移动: "To dodge Thanatos' desperation move, stay close to it and move quickly around its head"
注意与阿瑞斯的高斯核弹、特斯拉星流闪电保持距离: "Keep your distance from Ares' Gauss Nukes and Tesla Exo lightning"
阿瑞斯的终灭激光进行时，避免一昧地拉开距离: "Avoid blindly keeping your distance while Ares' Exo Obliterator beam is active"
这会激怒它并试图向上移动，增加躲避难度: "This will enrage it, causing it to move upwards and making it harder to dodge"
在星宇砧制作祭魂瓮: "Craft Ashen Altar at Cosmic Anvil"
随时使用即可召唤至尊灾厄: "Use at any time to summon Supreme Calamitas"
'[信息] 攻击方式-弹幕炼狱': "[Info] Attack Method - Bullet Hell"
在召唤时、生命值到达75%、50%、30%、10%时，各开始一次弹幕炼狱: "A bullet hell phase starts upon summoning, and when health reaches 75%, 50%, 30%, and 10%"
所有弹幕炼狱都含有直线移动的深渊亡魂: "All bullet hell phases contain straight-moving Abyssal Deadsouls"
第二波弹幕炼狱开始生成追踪并爆裂成一圈硫火飞弹的无际裂变: "The second bullet hell phase introduces Infinite Fissions that home in and explode into a ring of Brimstone Darts"
第三波弹幕炼狱开始生成追踪并爆裂成更多硫火飞弹的深渊炙炎: "The third bullet hell phase introduces Abyssal Flames that home in and explode into more Brimstone Darts"
最后一波弹幕炼狱生成上下摇摆的深渊炙颅: "The final bullet hell phase spawns Abyssal Flame Skulls that weave up and down"
玩家被击败后，弹幕炼狱持续时间将重置: "If a player is defeated, the bullet hell duration resets"
'[信息] 攻击方式-至尊灾厄': "[Info] Attack Method - Supreme Calamitas"
至尊灾厄在发射弹幕时会保持和玩家平齐: "Supreme Calamitas stays level with the player while firing projectiles"
硫火飞弹：发射硫火飞弹组成的弹幕墙: "Brimstone Darts: Fires a wall of Brimstone Darts"
深渊亡魂：预判玩家的速度发射快速的深渊亡魂: "Abyssal Deadsouls: Fires fast Abyssal Deadsouls predicting the player's velocity"
深渊炙炎：发射追踪并爆炸成大量深渊亡魂的深渊炙炎: "Abyssal Flames: Fires homing Abyssal Flames that explode into numerous Abyssal Deadsouls"
冲刺：向玩家进行预判冲刺: "Dash: Performs a predictive dash towards the player"
'[信息] 攻击顺序-常态': "[Info] Attack Sequence - Normal State"
硫火飞弹x3-深渊亡魂-深渊炙炎x2-冲刺x4: "Brimstone Darts x3 - Abyssal Deadsouls - Abyssal Flames x2 - Dash x4"
深渊炙炎x2-深渊亡魂-硫火飞弹x3-冲刺x2: "Abyssal Flames x2 - Abyssal Deadsouls - Brimstone Darts x3 - Dash x2"
硫火飞弹x3-深渊亡魂-深渊炙炎x4-深渊亡魂: "Brimstone Darts x3 - Abyssal Deadsouls - Abyssal Flames x4 - Abyssal Deadsouls"
冲刺x2-硫火飞弹x3-深渊炙炎x4-冲刺x4: "Dash x2 - Brimstone Darts x3 - Abyssal Flames x4 - Dash x4"
硫火飞弹x3-冲刺x2-硫火飞弹x3-冲刺x2-硫火飞弹x3: "Brimstone Darts x3 - Dash x2 - Brimstone Darts x3 - Dash x2 - Brimstone Darts x3"
在生命值低于45%时，冲刺的次数减半，硫火飞弹减少一轮: "When health is below 45%, the number of dashes is halved and Brimstone Darts are reduced by one round"
'[信息] 攻击方式-召唤单位': "[Info] Attack Method - Summons"
在生命值达到45%时召唤兄弟: "Summons her brothers when health reaches 45%"
兄弟会为至尊灾厄抵挡伤害并攻击玩家: "The brothers shield Supreme Calamitas from damage while attacking the player"
至尊灾难射出加速的斩魂幻锋: "Supreme Cataclysm fires accelerating Cataclysmic Slashes"
至尊灾祸射出硫火碎魂拳: "Supreme Catastrophe fires Brimstone Fist strikes"
一开始，两者均单发射出弹幕: "At first, both fire single projectiles"
生命值降至70%时发射频率增加: "Firing frequency increases when their health drops to 70%"
生命值降至40%时每四次攻击发射一次弹幕墙: "Fires a projectile wall every four attacks when health drops to 40%"
第一次弹幕炼狱结束后和生命值降低到20%时召唤灾坟魔物: "Summons Sepulcher after the first bullet hell ends and when health drops to 20%"
灾坟魔物是一个长直类敌人: "Sepulcher is a worm-like enemy"
它会从头到尾对玩家直射出硫火飞弹: "It fires Brimstone Darts directly at the player from its segments"
'[信息] 攻击方式-弹幕炼狱I/II': "[Info] Attack Method - Bullet Hell I/II"
第一轮弹幕炼狱：于召唤时开始: "Bullet Hell I: Starts upon summoning"
BOSS向上方发射主弹幕: "The BOSS fires a main projectile upward"
主弹幕会爆裂成一片带有预判性质的稀疏弹幕墙: "The main projectile splits into a sparse wall of predictive projectiles"
第二轮弹幕炼狱：于生命值到达75%时开始: "Bullet Hell II: Starts when health reaches 75%"
每次射出水平和垂直方向的两个弹幕轮: "Fires two projectile rings horizontally and vertically each time"
弹幕轮的性质与犽戎的火球圈相似，但旋转速度较低: "The projectile rings behave similarly to Yharon's fireball rings, but with a slower rotation speed"
'[信息] 攻击方式-弹幕炼狱III/IV': "[Info] Attack Method - Bullet Hell III/IV"
第三轮弹幕炼狱：于生命值到达50%时开始: "Bullet Hell III: Starts when health reaches 50%"
BOSS会以类似于硫磺火元素的方式发射硫火飞弹与深渊亡魂: "The BOSS fires Brimstone Darts and Abyssal Deadsouls in a manner similar to the Brimstone Elemental"
二者皆有预判性质: "Both types of projectiles have predictive tracking"
第四轮弹幕炼狱：于生命值到达30%时开始: "Bullet Hell IV: Starts when health reaches 30%"
BOSS会向下发射主弹幕: "The BOSS fires a main projectile downward"
主弹幕会爆裂成预判的深渊亡魂: "The main projectile splits into predictive Abyssal Deadsouls"
每隔几次攻击的主弹幕都会爆裂成弹幕墙: "Every few attacks, the main projectile splits into a projectile wall"
'[信息] 攻击方式-弹幕炼狱V': "[Info] Attack Method - Bullet Hell V"
第五轮弹幕炼狱：于生命值到达10%时开始: "Bullet Hell V: Starts when health reaches 10%"
向玩家射出深渊亡魂弹幕墙: "Fires a wall of Abyssal Deadsouls at the player"
深渊亡魂在短暂停顿后会再次追向玩家: "The Abyssal Deadsouls home in on the player again after a brief pause"
星流巨械提供的武器和装备可提供一定帮助: "Weapons and gear provided by the Exo Mechs can offer significant help"
灾坟魔物建议用对群武器优先清理；其他部分建议使用对单武器: "It is recommended to clear Sepulcher first using AoE weapons; single-target weapons are recommended for other parts"
不要一昧地远离BOSS冲刺的落点，可能导致下次冲刺后释放的技能无法躲避: "Do not blindly distance yourself from where the BOSS dashes, or you may be unable to dodge the follow-up skills"
常态下保持垂直移动，配合冲刺以避免被深渊炙炎弹幕贴脸: "Maintain vertical movement normally, combining it with dashes to avoid letting Abyssal Flames get right in your face"
兄弟阶段初期的攻击手段相对简单，可考虑在此时拖延进攻以恢复生命: "The brothers' attacks are relatively simple early on; consider stalling the fight here to recover health"
尽量避免双兄弟同时进入残血状态，这会导致弹幕过多难以躲避: "Try to avoid lowering both brothers to low health at the same time, as this floods the screen with too many projectiles to dodge"
弹幕炼狱I/III/IV：左右移动骗预判，随机应变躲弹幕: "Bullet Hell I/III/IV: Move left and right to bait the predictive targeting, and adapt on the fly to dodge projectiles"
弹幕炼狱II：向后移动+冲刺；左右移动和上下移动来对齐弹幕缝隙: "Bullet Hell II: Move backward + dash; use horizontal and vertical movements to align with the gaps in the projectiles"
弹幕炼狱IV：快速落地，弹幕炼狱开始后点按飞行保持向上移动（可用进升证章保证飞行时间）: "Bullet Hell IV: Fall to the ground quickly, then tap your flight key to keep moving upwards once the bullet hell begins (The Badge of Bravery can be used to ensure flight time)"
弹幕炼狱V：在快速飞行和自由落体间切换，用冲刺保证末端速度: "Bullet Hell V: Alternate between fast flight and free falling, utilizing dashes to maintain end speed"