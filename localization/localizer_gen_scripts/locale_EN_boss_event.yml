"苏醒了！": "has awoken!"
"被击败了.": "has been defeated."
"瘟疫核弹已就绪，准备发射！！！**音量控诉**": "Plague Nuclear Missile ready for launch!!! **VOLUME WARNING**"
"尔等蝼蚁，竟妄图离开地面挑战本尊的权威？": "Insignificant insects, you dare challenge my authority by leaving the ground?"
"你不是神……但你的灵魂仍是我的盛宴！": "You are no god... but I shall feast upon your soul regardless!"
"还没完呢！": "It's not over yet!"
"致命失误！": "Fatal error!"
"你知道吗？这一刻已经等了太久了。": "Did you know? I have been waiting for this moment for a very long time."
"我对一切未知感到着迷，但最让我着迷的莫过于你的本质。": "I am fascinated by all that is unknown, but nothing intrigues me more than your nature."
"我将会向你展示，我那些超越神明的造物。": "I will show you my creations, which surpass even the gods."
"而你，则将在战斗中向我展示你的本质。": "And you will show me your nature in battle."
"时间与知识的积累带来的不断改进，正是我作品精华所在。": "The constant improvement brought by the accumulation of time and knowledge is the essence of my work."
"接近完美的方法，除此再无。": "There is no other way to approach perfection."
"很好，很好，你的表现水平完全就在误差范围之内。": "Very well, very well. Your performance level is entirely within the margin of error."
"这着实令人满意。接下来我们将进入下一个测试环节。": "This is truly satisfactory. Now, we shall proceed to the next phase of the test."
"自我第一次到得知你的存在，我就一直在研究你的战斗，并以此让我的机械变得更强。": "Ever since I first became aware of your existence, I have been studying your battles to make my machines stronger."
"就算是现在，我依然在检测你的行动。一切都在我的计算之内。": "Even now, I am still monitoring your actions. Everything is within my calculations."
"有趣，十分有趣。": "Interesting, very interesting."
"就算是面对更为困难的挑战，你仍可以稳步推进。": "Even when faced with more difficult challenges, you can still advance steadily."
"我依然无法理解你的本质，这样下去可不行。": "I still cannot comprehend your nature. This cannot continue."
"......我一向追求完美，可惜造化弄人，这一定是我犯下的第一个错误。": "...I have always pursued perfection, but fate is fickle. This must be the first mistake I have ever made."
"荒谬至极。": "Utterly absurd."
"我不会再让那些无用的计算干扰我对这场战斗的观察了。": "I will no longer let futile calculations interfere with my observation of this battle."
"我将向你展示，我终极造物的全部威力。": "I will show you the full power of my ultimate creation."
"一个未知因素——你，是一个特异点。": "An unknown factor — you are a singularity."
"你对这片大地和它的历史而言，只是外来之人，就和我一样。": "To this land and its history, you are but an outsider, just like me."
"......很抱歉，但在看了这样一场“展示”之后，我必须得花点时间整理我的思绪。": "...My apologies, but after witnessing such a 'demonstration', I must take some time to organize my thoughts."
"迄今为止喷洒的血液已经让这片大陆变得陈腐无比，毫无生气。": "The blood spilled so far has left this continent stagnant and lifeless."
"你也挥洒了自己的鲜血，但这可能足以带来一个新的时代......是什么，我不知道。但那一定是我所渴望看到的时代。": "You have shed your own blood as well, but it may be enough to bring about a new era... What it is, I do not know. But it is certainly an era I long to see."
"现在，你想要接触那位暴君。可惜我无法帮到你。": "Now, you wish to reach the tyrant. Regrettably, I cannot assist you."
"这并非出自怨恨，毕竟从一开始，我的目标就只有观察刚才的这一场战斗。": "This is not out of malice. After all, from the very beginning, my only goal was to observe the battle that just took place."
"但你过去也成功过，所以你最后会找到办法的。": "But you have succeeded in the past, so you will find a way in the end."
"我必须尊重并承认你的胜利，但现在，我得把注意力放回到我的机械上了。": "I must respect and acknowledge your victory, but for now, I must return my attention to my machines."
