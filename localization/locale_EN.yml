"......自从上次已经多久了？一个世纪？还是都一个千年了？": "'...How long has it been since the last time? A century? Or a whole millennium?'"
"我把这圣物隐匿于纷争的焦点，就是为了防止它被再度使用。": "'I hid this relic away from the focal point of conflict precisely to prevent it from being used again.'"
"几乎没人知晓它的存在，那那些知道的人呢？": "'Hardly anyone knows of its existence, and those who do?'"
"他们都知道这件圣物曾经所提供的无穷的力量，现在都已经没法被利用了。": "'They all know that the boundless power this relic once provided can no longer be harnessed.'"
"在明知这些的情况下，却还是有人勇敢地制造了它的复制品，令人惊讶。": "'Knowing all this, that someone was still brave enough to craft a replica of it is quite surprising.'"
"这次竟是个凡人！多么有趣......": "'And a mortal, no less! How intriguing...'"
"它不过是块腐烂的石碑，究竟是什么驱使你竭尽全力也要制造它？": "'It is but a decaying slab of stone; what could have driven you to such lengths to recreate it?'"
"......这或许是个机会。得到这圣物可不是什么小打小闹。": '...Perhaps this is an opportunity. Acquiring this relic is no minor feat.'"
"是你，在终结一个时代的过程中，得到了曾终结了另一个时代的圣物......": "'It was you who, in the process of ending one era, obtained a relic that had ended another...'"
"是你，杀死了无名的巨蛇......": "'It was you who slew the nameless serpent...'"
"是你，击败了我的故友，不死之龙......": "'It was you who defeated my old friend, the immortal dragon...'"
"是你的力量，能和那唯一一个让我怀疑自己的凡人所匹敌......": "'It is your power that rivals the only mortal who ever made me doubt myself...'"
"我想测试你的力量，我会用我原始之光的碎片捏造出你过往敌人的形象。": "'I wish to test your strength. I shall fashion the likenesses of your past adversaries from fragments of my primordial light.'"
"这不是什么简单的活，但只要你能证明自己足够强大，我会给你一个提案。": "'This is no simple task, but if you can prove yourself strong enough, I shall offer you a proposal.'"
"你觉得自己能赢下这场挑战么？": "'Do you think you can win this challenge?'"
"到目前为止只是无足轻重的热身罢了，根本没达到我的期望。": "'Thus far, it has been nothing more than a trivial warm-up, falling well short of my expectations.'"
"让你的身体和灵魂准备好面对接下来的一切。": "'Prepare your body and soul for what comes next.'"
"我没错，你确实是一位值得令人敬重的战士。": "'I was not mistaken; you truly are a warrior worthy of respect.'"
"不过，你所展现的还不够。我们继续吧？": "'However, what you have shown is not yet enough. Shall we continue?'"
"你渴望变强的决心和意志......让我想起了自己，那时候我还只是一介凡人。": "'Your resolve and will to grow stronger... remind me of myself, back when I was but a mere mortal.'"
"但最为困难的挑战仍在前方，不要放松警惕，一刻也不要。": "'Yet the most difficult challenges still lie ahead. Do not let your guard down, not even for a moment.'"
"试炼就将抵达它的高潮。": "'The trial is about to reach its climax.'"
"是时候展现你的决心，和你力量与意志的真正限度了。": "'It is time to display your resolve, and the true limits of your power and will.'"
"向我证明，你足以超越自身。": "'Prove to me that you are capable of surpassing yourself.'"
"着实完美的展演。看来我是对的！你确实可能是这个世界最强大的战士，但......": "'A truly flawless performance. It seems I was right! You may indeed be the strongest warrior in this world, but...'"
"看来就算是那种力量......还是不够。恐怕我不能向你分享我的提案了。": "'It appears even that measure of strength... is still not enough. I am afraid I cannot share my proposal with you.'"
"尽管如此，虽然只是安慰奖，但我还是希望你拿着这些古代石头。": "'Nonetheless, though it is but a consolation prize, I would like you to take these ancient stones.'"
"它们是我从巨龙天巢上刻下来的；我带着当......纪念品，某种程度上。": "'They were carved from the Dragon Aerie by my own hand; I kept them as... mementos, in a way.'"
"尽管你没能达成我的需求，但未来我们的道路肯定还会有交叉！": "'Though you failed to meet my requirements, our paths will surely cross again in the future!'"
"继续寻求更为强大的力量吧，当我们再度相遇时，或许你的力量就够格了。": "'Continue your pursuit of greater power. Perhaps when we meet again, your strength will be sufficient.'"
"与此同时，我自己也还有必须要亲自处理的事情。": "'In the meantime, I have matters of my own that I must personally attend to.'"
"至于现在，先再见吧。": "'For now, farewell.'"
菜就多练，菜，就多练！: "If you're bad, practice more! Skill issue, just practice!"


