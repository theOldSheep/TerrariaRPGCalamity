# NPC messages (angler fishing info, NPC conversation, trading UI)
"向导": "Guide"
"玩法提示": "Gameplay Tips"
"BOSS会将召唤者附近所有达成挑战所需游戏进度的玩家视为敌人并以此获得生命加成。因此请尽量邀请世界中所有符合挑战资格的玩家一同作战，这样会大大增强成功率。造成伤害或仇恨时长足够的玩家都将自动获得一份战利品哦~": "BOSSes will view all players near the summoner who have reached the required progression as enemies and gain a health boost accordingly. Therefore, try to invite all eligible players in the world to fight together, which will greatly increase the success rate. Players who deal enough damage or hold aggro for long enough will automatically receive a copy of the loot~"
"右键基岩时可以进入上一层或下一层世界": "Right-click bedrock to enter the upper or lower world layer."
"新手期": "Pre-Boss"
"<name>，你好~请问有什么需要我帮忙的吗": "Hello, <name>~ Is there anything I can help you with?"
"请不要迟疑，迅速去挖掘原木，制作火把后下矿，提升自己的实力吧": "Do not hesitate! Quickly chop some logs, make torches, and head underground to mine and increase your strength."
"挖到生命水晶后可以右键使用增加生命上限哦~": "Once you mine a Life Crystal, you can right-click to use it and increase your maximum health~"
"点击背包里的合成格子可以打开随身合成配方列表": "Clicking on the crafting grid in your inventory opens the portable crafting recipe list."
"你如果感觉已经准备好了，请在合成台中制作一个祭坛，放置后可以合成BOSS召唤物。": "If you feel you are ready, please craft an Altar at a Crafting Table. Once placed, it can be used to craft BOSS summoning items."
"在做好准备后，可以尝试挑战史莱姆王，荒漠灾虫和克苏鲁之眼。战胜克苏鲁之眼后，我将会指导您的下一步行动。": "Once you are fully prepared, you can try challenging King Slime, the Desert Scourge, and the Eye of Cthulhu. After defeating the Eye of Cthulhu, I will guide your next steps."
"记得合成圈地锄头后圈地，这样财物才不会失窃！": "Remember to craft a Residence Boundary Hoe to claim your area so your belongings won't be stolen!"
"克苏鲁之眼后": "Post-Eye of Cthulhu"
"丛林地下的夜光蘑菇可以用来合成菌生蟹的召唤物。": "Glowing Mushrooms from the Underground Jungle can be used to craft the summoning item for Crabulon."
"<name>，我听说你已经击败了克苏鲁之眼了。恭喜！": "<name>, I heard you've defeated the Eye of Cthulhu. Congratulations!"
"据说，腐化之地有一种多节的巨虫，让他们现身需要筹备一些虫饵。这种虫的体表有鳞片，可以用来做更好的装备。": "They say a multi-segmented giant worm resides in the Corruption, and making it appear requires preparing some Worm Bait. This worm's body has scales that can be used to craft better gear."
"用克苏鲁之眼宝藏袋开的腐化种子右键泥土可以把一片地方变成腐化哦。": "You can use the Corrupt Seeds from the Eye of Cthulhu's Treasure Bag by right-clicking dirt to turn an area into the Corruption."
"世界吞噬者后": "Post-Eater of Worlds"
"腐化之地偶尔会生成一些恶心的囊肿。": "Disgusting cysts will occasionally spawn in the Corruption."
"世界吞噬者掉落的鳞片制作的镐足以挖掘地狱的狱炎石。尝试用狱炎石制作武器吧！": "The pickaxe crafted from Shadow Scales dropped by the Eater of Worlds is strong enough to mine Hellstone in the Underworld. Try making some weapons with Hellstone!"
"我有幸摸过一次勇者送给我的世界吞噬者的鳞片。真的坚硬又轻便，做成护甲效果应该很出色吧！": "I was fortunate enough to once touch a Shadow Scale given to me by a hero. It's truly hard yet lightweight; it would probably make excellent armor!"
"据说裁缝年轻时不幸深受诅咒。要小心，晚上向他提起这事他就会突然变成怪物……": "It is said that the Clothier suffered a terrible curse in his youth. Be careful, if you bring it up to him at night, he will suddenly turn into a monster..."
"裁缝最近精神越来越反常了……": "The Clothier's mind has been getting more and more unstable lately..."
"骷髅王后": "Post-Skeletron"
"史莱姆的神祇……有趣的传言。": "The god of slimes... an interesting rumor."
"你现在可以安全进入地牢了。地牢中的敌怪和武器可以为你今后的冒险提供助力！": "You can now safely enter the Dungeon. The enemies and weapons within can aid you in your future adventures!"
"血肉之墙后": "Post-Wall of Flesh"
"你听说过吗？丛林的地下可以偶尔生长出生命果，吃掉能获得新的力量！": "Have you heard? Life Fruits occasionally grow in the Underground Jungle, eating them grants new strength!"
"极寒的冰天雪地中，有一种强大的生物游荡……": "In the freezing snow and ice, a powerful creature wanders..."
"硫磺海里的巨型蠕虫不只是传说！有趣的是，它们与沙漠里的某条巨虫有很近的亲缘关系。": "The giant worms in the Sulphurous Sea aren't just legends! Interestingly, they share a very close lineage with a certain giant worm in the desert."
"我很好奇，如果能够击败并拆解坚固的机器，能铸造出怎样的兵器呢？": "I am curious, if we could defeat and dismantle those sturdy machines, what kind of weapons could be forged?"
"去挖铁吧，传说用铁和其他物品可以做出很神奇的东西，能引来某些机械的注意！虽然这不一定是好事儿……": "Go mine some Iron! Legend says Iron combined with other items can create something wondrous that attracts the attention of certain machinery! Though, that might not necessarily be a good thing..."
"神圣之地和腐化之地地表的生物开始携带珍贵的碎片了，用这些碎片似乎可以合成新武器！": "Creatures on the surface of the Hallow and Corruption have started carrying precious shards. It seems they can be used to craft new weapons!"
"神圣之地的洞穴中有时会发现水晶碎块。而此中最为稀有，最为晶莹剔透的种类可以吸引到史莱姆皇后的注意力！": "Crystal Shards can sometimes be found in Hallow caves. The rarest and most translucent type among them can catch the attention of Queen Slime!"
"神圣之地和腐化之地地下的生物开始掉落神奇的灵魂。不知道这些灵魂有什么作用……": "Creatures in the Underground Hallow and Underground Corruption have started dropping mysterious souls. I wonder what purposes these souls serve..."
"机械三王后": "Post-Mechanical Bosses"
"硫火之崖的元素灵在一场大战中失去了她所有的子民。去为她送上解脱吧……": "The elemental sprite of the Brimstone Crags lost all her people in a great war. Go and bring her peace..."
"地下丛林有几率长出一种神奇的红色果实，它们深受地下巨型植物的眷顾！不过，最好不要摘下这种果子，除非你想要激怒未知的植物……": "There is a chance for a mysterious red bulb to grow in the Underground Jungle, heavily blessed by a giant underground plant! However, it's best not to pluck it, unless you want to enrage an unknown plant..."
"这么大的植物……真的有可能存在吗？": "A plant that massive... could it truly exist?"
"世纪之花后": "Post-Plantera"
"星辉瘟疫污染了一台嘉登的采矿机。你有兴趣去看看吗？": "The Astral Infection has contaminated one of Draedon's mining machines. Are you interested in checking it out?"
"海洋中两位相依为命的生物……不合群的危险者……": "Two creatures depending on each other in the ocean... dangerous outcasts..."
"蜥蜴人……这种生物并不只存在于传说中！": "Lihzahrds... such creatures do not just exist in legends!"
"阿嚏！你是不是去过丛林了？": "Achoo! Have you been to the Jungle?"
"现在地牢生物更加强大了，他们偶尔会携带一些更加强力的武器！": "The Dungeon creatures are much stronger now, and they occasionally carry far more powerful weapons!"
"石巨人后": "Post-Golem"
"硫磺海下的深渊中有一种坚硬炽热的矿石，请利用石巨人掉落的镐尝试挖掘。": "There is a hard, scorching ore deep within the Abyss beneath the Sulphurous Sea. Please try to mine it using the pickaxe dropped by Golem."
"丛林地下偶尔会出现松露虫，用它在海里钓鱼可能会引出庞然大物！": "Truffle Worms occasionally appear in the Underground Jungle. Fishing with them in the ocean might lure out a colossal behemoth!"
"魔君的敌人曾在绝望中召唤出了一尊活跃至今的恐怖巨像。传言他们成为了巨像脚下的第一批亡魂……": "The Tyrant's enemies once, in desperation, summoned a terrifying colossus that remains active to this day. Rumor has it they became the very first souls crushed beneath its feet..."
"反抗者仅仅为抵抗嘉登，融合死去同伴的血肉和黑魔法制成了怪物。它践踏了所见的一切，包括制作者本人。": "Merely to resist Draedon, the rebels fused the flesh of their fallen comrades with dark magic to create a monster. It trampled everything in its sight, including its own creators."
"你听说过拜月教吗？据说他们的信徒最近开始出现在地牢里。一定要小心，他们看起来令人毛骨悚然！": "Have you heard of the Lunar Cult? Word is their devotees have recently started appearing at the Dungeon. Be careful, they look absolutely spine-chilling!"
"月球领主后": "Post-Moon Lord"
"巨龙的复制品在漫无目的地游荡在丛林中。你接下来的冒险想必将布满危险，先用它练练手并且提升实力吧！": "A clone of the dragon wanders aimlessly through the Jungle. Your upcoming adventures are bound to be perilous; use it to practice and hone your strength first!"
"亵渎天神……祂的守卫在神圣之地发觉了你的力量。倘若击杀这些守卫的话，你将直面天神的怒火！": "Providence... Her guardians have sensed your power within the Hallow. If you slay these guardians, you will face the undying wrath of the Goddess Herself!"
"亵渎天神后": "Post-Providence"
"地牢中的灵魂聚集在一起，创造了一个奇特的灵魂聚合体。小心；它并非善类！": "The spirits within the Dungeon have coalesced, creating a bizarre amalgam of souls. Watch out; it is by no means benevolent!"
"据传，硫磺海中有一只年迈的猪鲨。它的年龄并未减缓它的速度；相反，常年累积的战斗经验和硫磺海带来的异变使他异常棘手。": "Rumor has it that an ancient Duke Fishron resides in the Sulphurous Sea. Its age has not slowed it down; on the contrary, years of combat experience and mutations from the Sulphurous Sea make it exceptionally troublesome."
"亵渎天神的落败惊扰了宇宙之虫的仆从们。": "The defeat of Providence has disturbed the servants of the Devourer of Gods."
"神明吞噬者后": "Post-Devourer of Gods"
"宇宙之虫所吞噬的力量已为你所用；它们应该可以大幅度提升你的实力。": "The power consumed by the Devourer of Gods is now yours to command; it should significantly boost your strength."
"犽戎是魔君儿时起最忠诚的伙伴，一只巨龙。你或许已经具备了挑战他的能力。": "Yharon is a dragon, and the Tyrant's most loyal companion since childhood. You might finally possess the strength to challenge him."
"星流巨械前": "Pre-Exo Mechs"
"嘉登是魔君的匠人。他的造物已超越了人类的一切认知，甚至足以击败神明。": "Draedon is the Tyrant's blacksmith. His creations have surpassed all human comprehension, enough to best even the gods."
"至尊灾厄前": "Pre-Supreme Calamitas"
"硫火女巫，灾厄。在魔君的支配下缔造了无边的罪业。千万小心；被蒸干的大海只是她能力的冰山一角。": "The Brimstone Witch, Calamitas. Under the Tyrant's dominion, she wrought boundless sins. Be exceptionally careful; the evaporated oceans are merely the tip of the iceberg of her power."
"哥布林工匠": "Goblin Tinkerer"
"<name>，你现在的装备还不值得我去重铸。打败外面追杀我的哥布林军团证明自己吧！": "<name>, your current gear isn't even worth reforging. Go prove yourself by defeating the Goblin Army out there that's hunting me!"
"至少帮我赶走我那群烦死个人的同胞再来找我吧……我现在很忙……忙着研究新产品，也忙着逃命！": "At least help me drive away my incredibly annoying kin before coming to me... I'm very busy right now... busy researching new products, and busy running for my life!"
"我那群哥布林同族觉得我是异类，还说要一大早把我拿来炖汤喝！<name>，你能帮我吗？": "My fellow goblins think I'm an outcast, and they even threatened to stew me for breakfast! <name>, can you help me?"
"<name>，你有什么需要重铸的吗？我可以帮你刷新武器 and 饰品的前缀哦~": "<name>, do you have anything that needs reforging? I can help you reset the prefixes on your weapons and accessories~"
"你不觉得那边的电工妹很酷吗，<name>？": "Don't you think the Mechanic over there is pretty cool, <name>?"
"谢谢你，<name>！自从你们胖揍了那群哥布林之后，他们好久都没来烦我了！": "Thank you, <name>! Ever since you thrashed those goblins, they haven't bothered me in ages!"
"昨天我的锤子把坏掉了，还好我擅长修理！": "The handle on my hammer broke yesterday, good thing I'm an expert at fixing things!"
"金就是比铁硬，你蝌学课上是不是一直在睡觉？": "Gold is just harder than iron. Were you sleeping during science class?"
"来看看吧，<name>！我的产品经过改进后已经不会在你对着它吹气的时候猛烈爆炸啦！": "Take a look, <name>! My products have been improved so they won't violently explode the moment you blow on them anymore!"
"护士": "Nurse"
"<name>，你浑身都黏糊糊的，是不是又去追史莱姆玩了……": "<name>, you're completely covered in slime, did you go chasing them for fun again..."
"别嚎了，这不就刮了一下吗": "Stop crying, tis but a scratch."
"我这里还有点创可贴，给你贴上就走吧": "I've still got a few Band-Aids left, let me patch you up so you can get going."
"又去和小混混约架了？": "Out picking fights with thugs again?"
"淤青而已，没什么大事": "It's just a bruise, nothing major."
"告诉过你玩史莱姆要小心点了，你来晚点手就要化成水了！": "I told you to be careful around slimes! If you had come any later, your arm would've dissolved into water!"
"这还不是最糟糕的……我见过比这惨的……": "This isn't even the worst... I've seen way worse than this..."
"<name>老师，发生肾摸逝了？": "Master <name>, wut on earth happened?"
"你又去哪鬼混了？": "Where have you been fooling around this time?"
"别磨蹭了<name>，要治疗就快过来，要等死就跑远点！": "Stop dilly-dallying <name>! If you want treatment, get over here; if you want to die, go somewhere else!"
"我的天啊，你是掉到怪物堆里了吗？": "Oh my goodness, did you fall into a horde of monsters?"
"我不一定能完美接回去你的下巴。做好心理准备吧": "I can't guarantee I can perfectly reattach your jaw. Brace yourself."
"喔，这怕是要留疤": "Oof, that's probably going to leave a scar."
"我不是美容师，所以现在我帮不了忙": "I am not a beautician, so I can't help with that right now."
"不知道为什么，向导同志总是被岩浆烫伤。他也太不小心了吧！": "For some reason, Comrade Guide is always getting burned by lava. He is way too careless!"
"你帮我问问军火商……额，需不需要……治疗？": "Could you ask the Arms Dealer for me... um, if he needs... treatment?"
"又是普普通通的一天呢……但这样也没什么不好的嘛！": "Just another ordinary day... but there's nothing wrong with that!"
"我梦到了在月亮变成血红色的晚上，我赚了个盆满钵满！": "I dreamed that on a night when the moon turned blood red, I made an absolute fortune!"
"军火商": "Arms Dealer"
"这又不是动作大片，子弹当然会用完了！": "This isn't an action movie, of course you're going to run out of ammo!"
"如果不买就别碰我的迷你鲨，很贵的": "If you aren't buying, don't touch my Minishark. It's very expensive."
"这部件不合法？这个世界里钱就是法！": "This part is illegal? In this world, money IS the law!"
"来看看我新进的子弹吧，好枪就要配上好子弹！": "Come check out my new stock of ammo. A great gun deserves great bullets!"
"砰！哈哈，吓到你了吗？": "Bang! Haha, did I scare you?"
"爆破专家": "Demolitionist"
"艺术就是爆炸！": "Art is an explosion!"
"我一直好奇这样会（嘣！）额，那条腿…你还要的吧……": "I've always wondered if doing this would—(BOOM!) Uh, that leg... you still want it, right...?"
"手雷是新手对付一大批敌人的终极武器！": "Grenades are a novice's ultimate weapon for dealing with hordes of enemies!"
"炸弹和雷管，前期开矿时的好朋友！只是，用的时候记得保持距离……": "Bombs and Dynamite, a miner's best friends in the early game! Just remember to keep your distance when using them..."
"你知道吗？炸弹和雷管在投出后切换到镐并挥舞一次将以对应的镐力判定破坏方块！": "Did you know? Swinging your pickaxe right after throwing a bomb or dynamite will use that pickaxe's power to determine block breaking!"
"渔夫": "Angler"
"我听说过有种<fishName>，你给我整一条来！": "I've heard tales of a <fishName>, go fetch one for me!"
"<name>，别啰嗦，快给我弄条<fishName>！我要把它扔到向导的脸上！": "<name>, stop talking and get me a <fishName> already! I want to throw it right into the Guide's face!"
"我一直好奇<fishName>的味道是怎么样的，快给我弄一条尝尝鲜！不，当然没你的份！": "I've always wondered what a <fishName> tastes like. Hurry up and catch one for me to try! No, of course you don't get any!"
"我见过一种神奇的鱼，我叫他<fishName>！给我把它抓过来！": "I've seen a magical fish, I call it the <fishName>! Catch it and bring it to me!"
"不错，猴子！这是给你的，拍拍屁股滚蛋吧！": "Not bad, monkey! Here's your reward, now beat it!"
"鱼不算野味，尝一条也无妨嘛……": "Fish don't count as bushmeat, so there's no harm in having a taste..."
"不错不错，给你这些！": "Nice, nice! Here's your stuff!"
"知道了知道了，烦不烦啊！": "Yeah, yeah, I get it, stop annoying me!"
"一天就一条鱼，走开！": "Only one fish a day, go away!"
"明天再说，今天我要好好地玩玩这条鱼！": "Come back tomorrow, I'm going to have some fun playing with this fish today!"
"你完蛋了，史上伟大的渔夫要把你解雇一天！哈哈！": "You're finished! The greatest angler in history is firing you for the day! Haha!"
"我没见过父母长啥样，不过我倒是见过许多鱼，好看的，难看的，好吃的，难吃的……他们才是我的家人！": "I've never seen what my parents look like, but I've seen plenty of fish—pretty ones, ugly ones, tasty ones, nasty ones... they are my real family!"
"建材商人": "Architect"
"来买建筑材料吧！": "Come buy some building materials!"
"不来买点方块吗？": "Want to buy some blocks?"
"我这里可是有各种好玩的方块哦！": "I've got all kinds of fun blocks here!"
"裁缝": "Clothier"
"请帮我解除诅咒……太痛苦了……": "Please help me break the curse... it's so painful..."
"被诅咒的时候好无聊，只能做点针线活打发时间……": "Being cursed was so boring, I could only do needlework to pass the time..."
"好兄弟，帮我解除诅咒吧！": "Help me break the curse, brother!"
"不要贸然进入地牢，否则必将受到电刑的调教……": "Do not enter the Dungeon recklessly, or you will surely be disciplined with electrocution..."
"<name>，再次感谢你帮我解除诅咒！感觉像是被什么东西跳起来咬了一口。": "<name>, thanks again for breaking my curse! It felt like something jumped up and took a bite out of me."
"<name>，来看看我刚做好的服装吗？或者……你是来陪我这个老人聊天的？": "<name>, care to look at the clothes I just tailored? Or... did you come just to keep this old man company?"
"看好了，这样可以完整的抽出蛛丝中坚韧的线，制成的丝绸坚韧又光滑！": "Watch closely, this is how you extract the strongest threads from cobwebs to make silk that is both tough and smooth!"
"强盗": "Bandit"
"就凭你这小胳膊也想投掷武器？去健健身吧。": "You expect to throw weapons with those noodle arms? Go hit the gym."
"嘿，走路瞧着点，我的飞镖可不长眼睛！": "Hey, watch where you're walking, my darts don't have eyes!"
"你站在那肯定是想被钨钢无人机射成马蜂窝，是吧？": "Standing there like that, you must want to get turned into swiss cheese by a Wulfrum Drone, huh?"
"僵尸们不怎么擅长躲避，但愿你比它们强一点。": "Zombies aren't exactly great at dodging, I hope you're a bit better than them."
"嘿，别靠近那边！我刚刚做了点手脚，踏错一步你下一秒可能就躺地板上了。": "Hey, don't go near there! I just rigged the place; one wrong step and you'll be biting the dust next second."
"只要够大力，任何物品都能当作武器。": "As long as you throw it hard enough, anything can be a weapon."
"看好了，全靠手腕的巧劲，四两拨千斤！哦，就当无事发生过。": "Watch this, it's all in the wrist—using soft strength to overcome brute force! Oh... let's just pretend that didn't happen."
"你知道我是做什么的；劫富济贫。当然，中饱私囊。": "You know what I do; rob the rich, give to the poor. And of course, line my own pockets."
"啊，蛇，为什么总是蛇？": "Ah, snakes, why is it always snakes?"
"这才不是偷！我只不过是借，死的时候再还DA☆ZE！": "This isn't stealing! I'm just borrowing it until I die DA☆ZE!"
"你知道，拥有你想要的一切事物是超级好的，有些人从来没有过这种奢华的体验。": "You know, having everything you want is pretty great. Some people never get to experience that kind of luxury."
"哥布林工匠的口袋里不仅有刺球还有一大笔钱，但他心不在焉都没注意到被我偷了，笑死我了。": "The Goblin Tinkerer has loads of cash alongside those Spiky Balls in his pockets, but he's so clueless he didn't even notice me lifting them. Hilarious."
"想听点秘密？既然哥布林工匠每次都拿走你那么多钱，我其实早就盯上他了。这件事我要你保密。": "Want to hear a secret? Since the Goblin Tinkerer takes so much of your cash anyway, I've had my eye on him for a while. Keep this between us."
"嘿，既然政府的人能收税，为什么我就不能？什么？你说我们完全没有可比性？": "Hey, if the tax collector can do it, why can't I? What? You say we're completely incomparable?"
